<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Bemanningsplanering</title>
<style>
:root {
  --bg0:#070d1a;--bg1:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#475569;
  --t1:#f1f5f9;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;
  --blue:#60a5fa;--blue2:#3b82f6;--purple:#a78bfa;--teal:#2dd4bf;
  --amber:#fbbf24;--red:#f87171;--green:#34d399;--orange:#fb923c;
  --rad:8px;--rad2:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg1);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select{font:inherit;color:var(--t1);background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--rad2);padding:6px 10px;outline:none}
input:focus,select:focus{border-color:var(--blue)}
select option{background:var(--bg2)}
a{color:var(--blue);text-decoration:none}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;gap:48px}
.landing-header{text-align:center}
.landing-header h1{font-size:32px;font-weight:800;color:var(--t1);letter-spacing:-0.5px}
.landing-header h1 span{color:var(--blue)}
.landing-header p{color:var(--t3);margin-top:8px;font-size:15px}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:720px;width:100%}
.role-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:28px 24px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;text-align:left}
.role-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.role-card .icon{font-size:28px;margin-bottom:12px}
.role-card h2{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:6px}
.role-card p{color:var(--t3);font-size:13px;line-height:1.5}
.role-card .btn-enter{display:inline-block;margin-top:16px;background:var(--bg3);color:var(--t2);padding:7px 16px;border-radius:var(--rad2);font-size:13px;font-weight:600;transition:background 0.15s}
.role-card:hover .btn-enter{background:var(--blue2);color:#fff}

/* APP SHELL */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:195px;background:var(--bg0);border-right:1px solid var(--bg2);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:16px;border-bottom:1px solid var(--bg2)}
.sidebar-top .app-name{font-size:13px;font-weight:800;color:var(--t1);letter-spacing:0.5px}
.sidebar-top .role-badge{margin-top:4px;font-size:11px;color:var(--t3)}
.sidebar-top .back-btn{margin-top:10px;font-size:12px;color:var(--t4);cursor:pointer;display:flex;align-items:center;gap:4px}
.sidebar-top .back-btn:hover{color:var(--t3)}
.sidebar-nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-section{padding:4px 16px 2px;font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:0.8px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--t3);cursor:pointer;border-left:2px solid transparent;transition:all 0.1s;font-size:13px}
.nav-item:hover{color:var(--t2);background:var(--bg2)}
.nav-item.active{color:var(--t1);border-left-color:var(--blue);background:var(--bg2)}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{padding:12px 24px;border-bottom:1px solid var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1);position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;font-weight:700}
.topbar .sub{font-size:12px;color:var(--t3);margin-top:1px}
.content{padding:16px 20px;flex:1}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px}
.stat-card .label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:800;line-height:1}
.stat-card .sub{font-size:12px;color:var(--t3);margin-top:4px}

/* ALERTS */
.alert{border-radius:var(--rad);padding:12px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert.error{background:#3b0f0f;border:1px solid #7f1d1d}
.alert.warning{background:#3b2600;border:1px solid #78350f}
.alert.ok{background:#0d2e1e;border:1px solid #14532d}
.alert.info{background:#0c1f3d;border:1px solid #1e3a5f}
.alert .icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert .title{font-weight:600;font-size:13px;color:var(--t1)}
.alert .text{font-size:12px;color:var(--t3);margin-top:2px}

/* TABLES */
.table-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
td{padding:10px 14px;border-top:1px solid var(--bg3);font-size:13px;color:var(--t2);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.clickable-row{cursor:pointer}
.clickable-row:hover td{background:#1e3050}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.green{background:#0d2e1e;color:var(--green);border:1px solid #14532d}
.badge.red{background:#3b0f0f;color:var(--red);border:1px solid #7f1d1d}
.badge.amber{background:#3b2600;color:var(--amber);border:1px solid #78350f}
.badge.blue{background:#0c1f3d;color:var(--blue);border:1px solid #1e3a5f}
.badge.purple{background:#1e1040;color:var(--purple);border:1px solid #4c1d95}
.badge.gray{background:var(--bg3);color:var(--t3);border:1px solid var(--bg4)}

/* BEMANNING LAYOUT */
.bem-layout{display:grid;grid-template-columns:1fr 260px;gap:12px;height:calc(100vh - 130px)}
.bem-list{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.bem-detail{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.bem-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--t3);cursor:pointer;border:1px solid var(--bg4);transition:all 0.1s}
.filter-btn.active{background:var(--blue2);color:#fff;border-color:var(--blue2)}
.course-row{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bg3);cursor:pointer;transition:background 0.1s}
.course-row:hover{background:var(--bg3)}
.course-row.selected{background:#1e3050;border-left:3px solid var(--blue);padding-left:9px}
.course-row .cr-body{flex:1;min-width:0}
.course-row .cr-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.course-row .cr-meta{font-size:10px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-row .cr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.detail-header{padding:16px;border-bottom:1px solid var(--bg3)}
.detail-header h2{font-size:16px;font-weight:700}
.detail-header .meta{font-size:12px;color:var(--t3);margin-top:3px}
.detail-section{padding:14px 16px;border-bottom:1px solid var(--bg3)}
.detail-section h3{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hours-item{background:var(--bg3);border-radius:var(--rad2);padding:10px}
.hours-item .label{font-size:11px;color:var(--t4)}
.hours-item .value{font-size:18px;font-weight:700;color:var(--t1)}
.hours-item .sub{font-size:10px;color:var(--t4);margin-top:1px}

/* TEACHER ASSIGNMENT */
.assigned-teacher{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.assigned-teacher:last-child{border-bottom:none}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
.teacher-info .name{font-size:13px;font-weight:600;color:var(--t1)}
.teacher-info .meta{font-size:11px;color:var(--t4)}
.remove-btn{margin-left:auto;padding:4px 10px;border-radius:var(--rad2);background:var(--bg4);color:var(--t3);font-size:11px;cursor:pointer}
.remove-btn:hover{background:#7f1d1d;color:var(--red)}

/* LOAD BAR */
.load-bar-wrap{margin-top:6px}
.load-bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:3px}
.load-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.load-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t4)}

/* PICKER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:60px 20px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;width:600px;max-width:100%;flex-shrink:0}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:16px;font-weight:700}
.modal-close{font-size:20px;color:var(--t4);cursor:pointer;padding:4px 8px;border-radius:var(--rad2)}
.modal-close:hover{background:var(--bg3);color:var(--t1)}
.modal-body{padding:16px 20px;max-height:60vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid var(--bg3);display:flex;gap:10px;justify-content:flex-end}
.teacher-pick-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--rad);border:1px solid var(--bg3);margin-bottom:8px;cursor:pointer;transition:border-color 0.1s}
.teacher-pick-item:hover{border-color:var(--blue)}
.teacher-pick-item.selected{border-color:var(--blue);background:#0c1f3d}
.teacher-pick-item.blocked{opacity:0.5;cursor:not-allowed}
.teacher-pick-item .pick-info{flex:1;min-width:0}
.teacher-pick-item .pick-info .name{font-size:13px;font-weight:600;color:var(--t1)}
.teacher-pick-item .pick-info .title{font-size:11px;color:var(--t4)}
.pick-load{text-align:right;min-width:80px}
.pick-load .pct{font-size:18px;font-weight:800}
.pick-load .lbl{font-size:10px;color:var(--t4)}

/* UIÅ VIEW */
.uia-layout{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.uia-donut-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:20px;text-align:center}
.uia-legend{margin-top:16px;display:flex;flex-direction:column;gap:8px;text-align:left}
.uia-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.uia-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.uia-legend-label{color:var(--t3);flex:1}
.uia-legend-value{color:var(--t1);font-weight:700;font-size:13px}
.uia-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.uia-cat-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px}
.uia-cat-card .cat-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.uia-cat-card .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.uia-cat-card .cat-hours{font-size:24px;font-weight:800;color:var(--t1)}
.uia-cat-card .cat-pct{font-size:13px;color:var(--t3);margin-top:2px}
.uia-cat-card .cat-min{font-size:11px;color:var(--t4);margin-top:4px}
.uia-cat-card .cat-status{margin-top:8px}
.progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px}

/* HEATMAP */
.heatmap-wrap{overflow-x:auto}
.heatmap{border-collapse:collapse;font-size:11px}
.heatmap th{padding:4px 6px;color:var(--t4);font-weight:600;white-space:nowrap;background:var(--bg2);position:sticky;top:0}
.heatmap td.name-cell{padding:6px 10px;color:var(--t2);white-space:nowrap;background:var(--bg2);position:sticky;left:0;border-right:1px solid var(--bg3);font-weight:600}
.heatmap td.cell{width:36px;height:28px;text-align:center;font-size:10px;font-weight:700;border:1px solid var(--bg1)}
.cell-0{background:#0d2e1e;color:var(--green)}
.cell-1{background:#1a3a1a;color:#86efac}
.cell-2{background:#3b2600;color:var(--amber)}
.cell-3{background:#3b0f0f;color:var(--red)}

/* REPORT BUILDER */
.report-filters{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.report-filters .filter-group{display:flex;flex-direction:column;gap:4px}
.report-filters label{font-size:11px;color:var(--t3);font-weight:600}
.chart-bar-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:160px;margin-bottom:8px}
.chart-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.chart-bar .bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.3s;min-height:4px}
.chart-bar .bar-label{font-size:9px;color:var(--t4);margin-top:4px;text-align:center;white-space:nowrap;overflow:hidden;width:100%;text-overflow:ellipsis}
.chart-bar .bar-val{font-size:10px;font-weight:700;color:var(--t2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rad2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-primary{background:var(--blue2);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--bg3);color:var(--t2);border:1px solid var(--bg4)}
.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:#7f1d1d;color:var(--red)}
.btn-danger:hover{background:#991b1b}
.btn-sm{padding:5px 11px;font-size:12px}

/* HR COMPETENCE */
.comp-grid{display:grid;grid-template-columns:180px repeat(6,1fr);border-collapse:collapse}
.comp-header{background:var(--bg3);padding:8px 6px;font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;text-align:center;border:1px solid var(--bg1)}
.comp-name{background:var(--bg2);padding:8px 10px;font-size:12px;color:var(--t2);border:1px solid var(--bg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.comp-cell{background:var(--bg2);padding:8px;text-align:center;border:1px solid var(--bg3);font-size:14px}
.comp-cell.yes{background:#0d1f14}
.comp-cell.partial{background:#1e1a00}

/* MISC */
.section-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:12px}
.section-sub{font-size:12px;color:var(--t3);margin-bottom:16px;margin-top:-8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px;margin-bottom:12px}
.divider{height:1px;background:var(--bg3);margin:12px 0}
.empty{text-align:center;padding:40px;color:var(--t4);font-size:13px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--rad2);padding:7px 12px;margin-bottom:12px}
.search-box input{background:none;border:none;flex:1;color:var(--t1);outline:none}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:var(--bg3);color:var(--t3);margin:2px}
</style>
</head>

<div id="app"></div>

function getStaff(id){return STAFF.find(s=>s.id===id)}
function getCourse(id){return COURSES.find(c=>c.id===id)}
function getStaffAssignments(staffId){return ASSIGNMENTS.filter(a=>a.staffId===staffId)}
function getCourseAssignments(courseId){return ASSIGNMENTS.filter(a=>a.courseId===courseId)}
function totalTeachingHours(staffId){return getStaffAssignments(staffId).reduce((s,a)=>s+a.hours,0)}

function courseStatus(courseId){
  const course=getCourse(courseId);
  const asgns=getCourseAssignments(courseId);
  if(!asgns.length) return 'unstaffed';
  const assigned=asgns.reduce((s,a)=>s+a.hours,0);
  if(assigned>=course.neededHours*0.9) return 'full';
  return 'partial';
}

function statusBadge(status){
  if(status==='full') return '<span class="badge green">✓ Bemannad</span>';
  if(status==='partial') return '<span class="badge amber">⚠ Delvis</span>';
  return '<span class="badge red">✗ Ej bemannad</span>';
}

function titleColor(title){
  if(title==='Professor'||title==='Docent') return 'var(--purple)';
  if(title==='Lektor') return 'var(--blue)';
  if(title==='Adjunkt') return 'var(--teal)';
  return 'var(--t4)';
}

function loadPct(staffId){
  const p=getStaff(staffId);
  const th=totalTeachingHours(staffId);
  const reserved=Math.round(p.annual*(p.fok+p.koll+(p.extFok||0))/100);
  const avail=p.annual-reserved;
  return Math.round(th/avail*100);
}

function loadColor(pct){
  if(pct<=60) return 'var(--green)';
  if(pct<=85) return 'var(--amber)';
  return 'var(--red)';
}
function loadLabel(pct){
  if(pct<=60) return 'Låg';
  if(pct<=85) return 'Måttlig';
  if(pct<=100) return 'Hög';
  return 'ÖVERTID';
}

function validate(staffId, hoursToAdd){
  const p=getStaff(staffId);
  if(!p) return {ok:false,errors:['Person ej hittad'],warnings:[]};
  const annual=p.annual;
  const fokH=Math.round(annual*p.fok/100);
  const kollH=Math.round(annual*p.koll/100);
  const extH=Math.round(annual*(p.extFok||0)/100);
  const reserved=fokH+kollH+extH;
  const avail=annual-reserved;
  const curTeach=totalTeachingHours(staffId);
  const newTeach=curTeach+hoursToAdd;
  const pct=Math.round(newTeach/annual*100);
  const errors=[];const warnings=[];

  if(p.title==='Doktorand'){
    const maxH=Math.round(annual*(p.maxTeachPct||20)/100);
    if(newTeach>maxH) errors.push(`Doktorand: max ${p.maxTeachPct||20}% institutionstjänstgöring (${maxH}h). Ny total: ${newTeach}h.`);
    else if(newTeach>maxH*0.85) warnings.push(`Doktoranden närmar sig gränsen (${newTeach}h av max ${maxH}h).`);
  }
  if(newTeach>avail) errors.push(`Övertid: ${newTeach}h undervisning överstiger tillgänglig tid ${avail}h (${annual}h − ${reserved}h reserverat).`);
  else if(newTeach>avail*0.92) warnings.push(`Hög belastning: ${pct}% av årsarbetstiden går till undervisning, lite marginal kvar.`);
  if(newTeach+reserved>annual) errors.push(`Total arbetstid ${newTeach+reserved}h överstiger årsarbetstid ${annual}h.`);

  return {ok:errors.length===0,errors,warnings,curTeach,newTeach,pct,annual,reserved,avail};
}


function uiaData(staffId){
  const p=getStaff(staffId);
  const teach=totalTeachingHours(staffId);
  const fokH=Math.round(p.annual*p.fok/100);
  const kollH=Math.round(p.annual*p.koll/100);
  const extH=Math.round(p.annual*(p.extFok||0)/100);
  const adminH=Math.max(0,p.annual-teach-fokH-kollH-extH);
  return {teach,fok:fokH,koll:kollH,ext:extH,admin:adminH,annual:p.annual};
}

function renderKapacitet(){
  const titles=['Professor','Docent','Lektor','Adjunkt'];
  const periods=['V36','V37','V38','V39','V40','V41','V42','V43','V44','V45','V46','V47','V48','V49','V50'];
  const shown=STAFF.filter(s=>titles.includes(s.title)).slice(0,25);
  return `<div class="topbar"><div><h1>Kapacitetskarta</h1><div class="sub">Undervisningsbelastning per person och vecka · HT 2025</div></div></div>
  <div class="content">
    <div class="alert info"><span class="icon">ℹ</span><div><div class="title">Läs kartan</div><div class="text">Visar estimerad veckabelastning baserat på terminsuppdragens totaltimmar fördelade jämnt. Grönt ≤60% · Gult 61–85% · Rött &gt;85%.</div></div></div>
    <div class="heatmap-wrap">
      <table class="heatmap">
        <thead><tr><th>Lärare</th><th>Titel</th>${periods.map(p=>`<th>${p}</th>`).join('')}</tr></thead>
        <tbody>
          ${shown.map(s=>{
            const lp=loadPct(s.id);
            const basePct=lp;
            return `<tr>
              <td class="name-cell">${s.name}</td>
              <td class="name-cell" style="color:${titleColor(s.title)};font-weight:700;font-size:11px">${s.title}</td>
              ${periods.map((p,i)=>{
                const noise=(Math.sin(s.id*7+i*3)*15)|0;
                const pct=Math.max(0,Math.min(120,basePct+noise));
                const cls=pct<=60?'cell-0':pct<=85?'cell-1':pct<=100?'cell-2':'cell-3';
                return `<td class="cell ${cls}">${pct}%</td>`;
              }).join('')}

      </table>
    </div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:12px">
      <span><span style="display:inline-block;width:12px;height:12px;background:#0d2e1e;border-radius:2px;margin-right:4px"></span>≤60% Låg</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#1a3a1a;border-radius:2px;margin-right:4px"></span>61–85% Måttlig</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#3b2600;border-radius:2px;margin-right:4px"></span>86–100% Hög</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#3b0f0f;border-radius:2px;margin-right:4px"></span>&gt;100% Övertid</span>
    </div>
  </div>`;
}

function donutSVGFixed(segs,annual){
  const r=54,size=160,cx=80,cy=80;
  const C=2*Math.PI*r;
  const total=annual;
  let circles='',cum=0;
  for(const g of segs){
    if(!g.value) continue;
    const segLen=(g.value/total)*C;
    const offset=(C*0.25)-cum;
    circles+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${g.color}" stroke-width="20" stroke-dasharray="${segLen.toFixed(1)} ${(C-segLen).toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>`;
    cum+=segLen;
  }
  const totalUsed=segs.reduce((s,g)=>s+g.value,0);
  return `<svg viewBox="0 0 160 160" width="160" height="160">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#334155" stroke-width="20"/>
    ${circles}
    <text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="800">${totalUsed}h</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#94a3b8" font-size="10">av ${annual}h</text>
  </svg>`;
}

function showModal(){
  const existing=document.getElementById('modal-overlay');
  if(existing) existing.remove();
  const course=getCourse(state.pickerCourseId);
  if(!course) return;
  const already=getCourseAssignments(course.id).map(a=>a.staffId);
  const candidates=STAFF.filter(s=>!already.includes(s.id)).sort((a,b)=>{
    const aMatch=course.subjects.some(sub=>a.subject===sub)?0:1;
    const bMatch=course.subjects.some(sub=>b.subject===sub)?0:1;
    return aMatch-bMatch||loadPct(a.id)-loadPct(b.id);
  });
  const sel=state.pickerSelectedStaffId;
  const valResult=sel?validate(sel,state.pickerHours):null;

  const html=`<div class="modal-overlay" id="modal-overlay" onclick="closePickerOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Tilldela lärare — ${course.name}</h2>
        <button class="modal-close" onclick="closePicker()">×</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:12px">
          <div class="search-box">🔍 <input id="picker-search" placeholder="Sök lärare..." oninput="filterPickerList(this.value)"></div>
        </div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:8px">Sorterat: Ämnesträff → Ledighet. Klicka för att välja.</div>
        <div id="picker-list">
          ${candidates.map(s=>{
            const lp=loadPct(s.id);
            const match=course.subjects.some(sub=>s.subject===sub);
            const isBlocked=lp>=100;
            const isSel=sel===s.id;
            return `<div class="teacher-pick-item${isSel?' selected':''}${isBlocked?' blocked':''}"
              onclick="${isBlocked?'':'pickTeacher('+s.id+')'}" data-name="${s.name.toLowerCase()}" data-title="${s.title.toLowerCase()}" data-subject="${s.subject.toLowerCase()}">
              <div class="avatar" style="background:${titleColor(s.title)}22;color:${titleColor(s.title)}">${s.initials}</div>
              <div class="pick-info">
                <div class="name">${s.name}</div>
                <div class="title">${s.title} · ${s.subject}</div>
                <div style="margin-top:4px">
                  ${match?'<span class="badge green" style="font-size:10px">✓ Ämnesträff</span>':'<span class="badge gray" style="font-size:10px">Angränsande</span>'}
                  ${isBlocked?'<span class="badge red" style="font-size:10px;margin-left:4px">✗ Fullt belagd</span>':''}
                </div>
              </div>
              <div class="pick-load">
                <div class="pct" style="color:${loadColor(lp)}">${lp}%</div>
                <div class="lbl">belagd</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${sel?`<div style="padding:14px 20px;border-top:1px solid var(--bg3);border-bottom:1px solid var(--bg3);background:var(--bg3)">
        <div style="font-size:12px;color:var(--t3);margin-bottom:6px;font-weight:700">Antal timmar att tilldela</div>
        <div style="display:flex;align-items:center;gap:12px">
          <input type="range" min="10" max="300" value="${state.pickerHours}" step="5" oninput="state.pickerHours=+this.value;document.getElementById('picker-hours-val').textContent=this.value+'h';document.getElementById('picker-validation').innerHTML=renderValidation(${sel},+this.value)">
          <span id="picker-hours-val" style="font-size:18px;font-weight:800;color:var(--blue);min-width:50px">${state.pickerHours}h</span>
        </div>
        <div id="picker-validation">${renderValidation(sel,state.pickerHours)}</div>
      </div>`:''}
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closePicker()">Avbryt</button>
        ${sel&&valResult?.ok?`<button class="btn btn-primary" onclick="confirmAssign()">✓ Tilldela ${state.pickerHours}h</button>`:
          sel?`<button class="btn btn-danger" disabled>✗ Kan ej tilldela</button>`:'<button class="btn btn-primary" disabled>Välj lärare</button>'}
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  if(state.pickerSelectedStaffId){
    document.querySelector('.teacher-pick-item.selected')?.scrollIntoView({block:'nearest'});
  }
}

function renderValidation(staffId,hours){
  const v=validate(staffId,hours);
  const p=getStaff(staffId);
  let html=`<div style="margin-top:10px;font-size:12px">
    <div style="margin-bottom:6px;color:var(--t3)">Konsekvenser för ${p.name}:</div>
    <div style="display:flex;gap:16px;margin-bottom:8px">
      <span>Undervisning nu: <b style="color:var(--t2)">${v.curTeach}h</b></span>
      <span>→ Efter: <b style="color:${loadColor(v.pct)}">${v.newTeach}h (${v.pct}%)</b></span>
      <span>Tillgängligt: <b style="color:var(--t3)">${v.avail}h</b></span>
    </div>`;
  if(v.errors.length) html+=v.errors.map(e=>`<div class="alert error" style="margin-bottom:6px;padding:8px 12px"><span class="icon">✗</span><div><div class="title">${e}</div></div></div>`).join('');
  if(v.warnings.length) html+=v.warnings.map(w=>`<div class="alert warning" style="margin-bottom:6px;padding:8px 12px"><span class="icon">⚠</span><div><div class="title">${w}</div></div></div>`).join('');
  if(v.ok&&!v.warnings.length) html+=`<div class="alert ok" style="padding:8px 12px"><span class="icon">✓</span><div><div class="title">Inga avtalskonflikter — OK att tilldela</div></div></div>`;
  html+='</div>';
  return html;
}

// EVENTS
// ============================================================
function attachEvents(){}

function selectRole(role){
  state.role=role;
  state.view=role==='prefekt'?'dashboard':role==='larare'?'tjansteplan':role==='hr'?'personal':role==='ekonom'?'budget':'dashboard';
  state.selectedCourse=null;
  state.pickerOpen=false;
  render();
}

function navigate(view){
  state.view=view;
  if(view!=='bemanning') state.selectedCourse=null;
  render();
}

function selectCourse(id){
  state.selectedCourse=id;
  state.view='bemanning';
  render();
}

function setBemFilter(f){
  state.bemanFilter=f;
  render();
}

function openPicker(courseId,preselect){
  state.pickerOpen=true;
  state.pickerCourseId=courseId;
  state.pickerSelectedStaffId=preselect||null;
  state.pickerHours=60;
  showModal();
}

function closePicker(){
  state.pickerOpen=false;
  const el=document.getElementById('modal-overlay');
  if(el) el.remove();
}

function closePickerOutside(e){
  if(e.target.id==='modal-overlay') closePicker();
}

function pickTeacher(id){
  state.pickerSelectedStaffId=id;
  showModal();
}

function confirmAssign(){
  if(!state.pickerSelectedStaffId||!state.pickerCourseId) return;
  const v=validate(state.pickerSelectedStaffId,state.pickerHours);
  if(!v.ok){alert('Kan inte tilldela: '+v.errors.join('\n'));return;}
  ASSIGNMENTS.push({id:nextAssignId++,courseId:state.pickerCourseId,staffId:state.pickerSelectedStaffId,hours:state.pickerHours});
  closePicker();
  render();
}

function removeAssignment(id){
  ASSIGNMENTS=ASSIGNMENTS.filter(a=>a.id!==id);
  render();
}

function filterPickerList(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('.teacher-pick-item').forEach(el=>{
    const matches=!q||el.dataset.name.includes(ql)||el.dataset.title.includes(ql)||el.dataset.subject.includes(ql);
    el.style.display=matches?'flex':'none';
  });
}

// Init
render();
</script>
