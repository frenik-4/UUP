<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUP Bemanning</title>
<style>
:root{
  --bg0:#0a0f1a;--bg1:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --t1:#f1f5f9;--t2:#e2e8f0;--t3:#cbd5e1;--t4:#94a3b8;
  --blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
  --rad:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}

.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:40px;width:400px}
.login-card h1{font-size:22px;color:var(--t1);margin-bottom:4px}
.login-card .sub{color:var(--t4);font-size:12px;margin-bottom:28px}
.login-card label{display:block;color:var(--t3);font-size:11px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.login-card input{width:100%;background:var(--bg1);border:1px solid var(--bg3);border-radius:6px;padding:10px 12px;color:var(--t1);font-size:14px;margin-bottom:16px;outline:none}
.login-card input:focus{border-color:var(--blue)}
.btn-primary{width:100%;background:var(--blue);border:none;border-radius:6px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;margin-bottom:12px;padding:8px 10px;background:#2d1515;border-radius:5px;border:1px solid #7f1d1d}
.demo-accounts{margin-top:24px;padding-top:20px;border-top:1px solid var(--bg3)}
.demo-accounts p{color:var(--t4);font-size:11px;margin-bottom:10px}
.demo-btn{background:var(--bg1);border:1px solid var(--bg3);border-radius:5px;padding:6px 10px;color:var(--t3);font-size:11px;cursor:pointer;margin:3px 3px 0 0;display:inline-block}
.demo-btn:hover{border-color:var(--blue);color:var(--t1)}

.topbar{background:var(--bg1);border-bottom:1px solid var(--bg2);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-title{font-weight:800;font-size:14px;letter-spacing:.08em}
.app-title span{color:var(--blue)}
.period-badge{background:var(--bg2);border:1px solid var(--bg3);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--t4)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:4px 10px 4px 4px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t3)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.logout-btn{background:none;border:1px solid var(--bg3);border-radius:5px;padding:4px 10px;color:var(--t4);font-size:11px;cursor:pointer}
.logout-btn:hover{color:var(--t1);border-color:var(--t4)}

.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:195px;background:var(--bg0);border-right:1px solid var(--bg2);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-section{padding:16px 12px 8px;color:var(--t4);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:var(--t3);cursor:pointer;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{background:var(--bg2);color:var(--t1)}
.nav-item.active{background:var(--bg2);color:var(--t1);border-left-color:var(--blue)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:20px 24px}

.page-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px}
.page-sub{color:var(--t4);font-size:12px;margin-bottom:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px}
.stat-label{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;color:var(--t1);line-height:1}
.stat-sub{font-size:11px;color:var(--t4);margin-top:4px}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.amber .stat-value{color:var(--amber)}

.alert{border-radius:var(--rad);padding:12px 16px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.alert.red{background:#2d1515;border:1px solid #7f1d1d}
.alert.amber{background:#2d1f0a;border:1px solid #78350f}
.alert.blue{background:#0f1e3a;border:1px solid #1e3a6e}
.alert-icon{flex-shrink:0;font-size:15px;margin-top:1px}
.alert-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px}
.alert-body{font-size:12px;color:var(--t3)}

table{width:100%;border-collapse:collapse;margin-top:4px}
th{text-align:left;font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--bg3)}
td{padding:10px 10px;border-bottom:1px solid var(--bg2);font-size:13px;color:var(--t2)}
tr:hover td{background:var(--bg2)}
.clickable-row{cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.green{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.badge.amber{background:#451a03;color:#fcd34d;border:1px solid #78350f}
.badge.red{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.badge.blue{background:#0f1e3a;color:#93c5fd;border:1px solid #1d4ed8}
.badge.gray{background:var(--bg2);color:var(--t4);border:1px solid var(--bg3)}

.bem-layout{display:grid;grid-template-columns:1fr 290px;gap:12px;height:calc(100vh - 145px)}
.bem-list{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.bem-detail{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.course-row{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bg3);cursor:pointer}
.course-row:hover{background:var(--bg3)}
.course-row.selected{background:#1e3050;border-left:3px solid var(--blue);padding-left:9px}
.cr-body{flex:1;min-width:0}
.cr-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cr-meta{font-size:10px;color:var(--t3);margin-top:2px}
.cr-right{flex-shrink:0}
.detail-pad{padding:16px}
.detail-kurs-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:3px}
.detail-kurs-meta{font-size:12px;color:var(--t4);margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.info-cell{background:var(--bg1);border-radius:6px;padding:10px 12px}
.info-cell-label{font-size:10px;color:var(--t4);font-weight:700;text-transform:uppercase;margin-bottom:4px}
.info-cell-value{font-size:18px;font-weight:700;color:var(--t1)}
.section-title{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.teacher-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg3)}
.teacher-row:last-child{border-bottom:none}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.teacher-info{flex:1;min-width:0}
.teacher-name{font-size:13px;font-weight:600;color:var(--t1)}
.teacher-meta{font-size:11px;color:var(--t4)}
.btn-sm{background:var(--bg3);border:none;border-radius:5px;padding:5px 8px;color:var(--t2);font-size:11px;cursor:pointer}
.btn-sm:hover{background:var(--blue);color:#fff}
.btn-add{width:100%;background:transparent;border:1px dashed var(--bg3);border-radius:6px;padding:10px;color:var(--t4);font-size:13px;cursor:pointer;margin-top:10px;text-align:center}
.btn-add:hover{border-color:var(--blue);color:var(--blue);background:#0f1e3a}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:5px 12px;color:var(--t3);font-size:12px;cursor:pointer}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:120px;padding:30px;text-align:center;color:var(--t4);gap:8px}
.empty-icon{font-size:32px;opacity:.4}

.kap-row{display:grid;grid-template-columns:175px 1fr 75px;gap:12px;align-items:center;padding:9px 8px;border-bottom:1px solid var(--bg2);cursor:pointer;border-radius:6px}
.kap-row:hover{background:var(--bg2)}
.kap-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.kap-bar-fill{height:100%;border-radius:4px}
.kap-bar-godkand{background:var(--green)}
.kap-bar-begard{position:absolute;top:0;background:var(--amber)}
.kap-legend{display:flex;gap:14px;margin-bottom:12px}
.kap-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t4)}
.kap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tidskonto-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:14px;margin-bottom:14px}
.tk-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bg3)}
.tk-row:last-child{border-bottom:none}
.tk-label{font-size:12px;color:var(--t3)}
.tk-value{font-size:13px;font-weight:600;color:var(--t1)}
.pending-item{background:var(--bg1);border:1px solid var(--bg3);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.pending-kurs{font-size:13px;font-weight:600;color:var(--t1)}
.pending-meta{font-size:11px;color:var(--t4);margin-top:2px}
.pending-actions{display:flex;gap:6px;margin-top:8px}
.btn-approve{background:#065f46;border:none;border-radius:5px;padding:6px 14px;color:#6ee7b7;font-size:12px;font-weight:600;cursor:pointer}
.btn-approve:hover{background:#047857}
.btn-reject{background:#450a0a;border:none;border-radius:5px;padding:6px 14px;color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer}
.btn-reject:hover{background:#7f1d1d}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg1);border:1px solid var(--bg3);border-radius:12px;width:560px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--t1)}
.modal-close{background:none;border:none;color:var(--t4);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--t1)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--bg3);display:flex;justify-content:flex-end;gap:8px}
.picker-search{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 12px;color:var(--t1);font-size:13px;outline:none;margin-bottom:12px}
.picker-search:focus{border-color:var(--blue)}
.picker-person-row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.picker-person-row:hover{background:var(--bg2)}
.picker-person-row.selected{background:#0f1e3a;border-color:var(--blue)}
.picker-cap{margin-left:auto;text-align:right;flex-shrink:0}
.picker-cap-val{font-size:14px;font-weight:700}
.cap-ok{color:var(--green)}
.cap-warn{color:var(--amber)}
.cap-over{color:var(--red)}
.picker-cap-label{font-size:10px;color:var(--t4)}
.hours-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bg3);flex-wrap:wrap}
.hours-row label{font-size:12px;color:var(--t3);font-weight:600}
.hours-input{width:75px;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:7px 10px;color:var(--t1);font-size:14px;text-align:center;outline:none}
.hours-input:focus{border-color:var(--blue)}
.sel{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:7px 10px;color:var(--t1);font-size:13px;outline:none}
.val-msg{font-size:11px;padding:6px 10px;border-radius:5px;margin-top:8px}
.val-msg.err{background:#2d1515;color:#fca5a5;border:1px solid #7f1d1d}
.val-msg.warn{background:#2d1f0a;color:#fcd34d;border:1px solid #78350f}
.btn-cancel{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 18px;color:var(--t3);font-size:13px;cursor:pointer}
.btn-confirm{background:var(--blue);border:none;border-radius:6px;padding:8px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-confirm:hover{background:#2563eb}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed}

.loading{display:flex;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--t4)}
.spinner{width:20px;height:20px;border:2px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const API = '/api';
const VERSION = '0.2.0';

let S = {
  token: localStorage.getItem('uup_token'),
  user:  JSON.parse(localStorage.getItem('uup_user') || 'null'),
  view: 'dashboard',
  year: 2026,
  // cached lists
  avdelningar: null, perioder: null, personal: null, kurser: null, kapacitet: null,
  kursCache: {}, kontoCache: {},
  // ui
  selectedKurs: null, kursDetail: null,
  selectedPerson: null,
  bemanFilter: 'all', kapFilter: null, kapSearch: '',
  // picker
  pickerKursId: null, pickerPersonId: null,
  pickerTimmar: 60, pickerStatus: 'begard', pickerSearch: '',
  pickerValMsg: null,
  // misc
  pendingCount: 0, loginErr: '', loginLoading: false,
};

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: {'Content-Type':'application/json',
      ...(S.token ? {'Authorization':'Bearer '+S.token} : {}),
      ...(opts.headers||{})}
  });
  if (r.status === 204) return null;
  const d = await r.json();
  if (!r.ok) throw d;
  return d;
}

// ─── AUTH ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const epost = document.getElementById('l-e')?.value?.trim();
  const pw    = document.getElementById('l-p')?.value;
  if (!epost || !pw) return;
  S.loginLoading = true; S.loginErr = ''; render();
  try {
    const res = await api('/auth/login', {method:'POST', body:JSON.stringify({epost, losenord:pw})});
    S.token = res.access_token; S.user = res.anvandare;
    localStorage.setItem('uup_token', S.token);
    localStorage.setItem('uup_user',  JSON.stringify(S.user));
    S.loginLoading = false;
    await loadBase();
    render();
  } catch(e) {
    S.loginErr = typeof e.detail==='string' ? e.detail : 'Inloggning misslyckades';
    S.loginLoading = false; render();
  }
}

function fillDemo(e) {
  document.getElementById('l-e').value = e;
  document.getElementById('l-p').value = 'demo1234';
}

function logout() {
  localStorage.removeItem('uup_token'); localStorage.removeItem('uup_user');
  Object.assign(S, {token:null,user:null,view:'dashboard',avdelningar:null,perioder:null,
    personal:null,kurser:null,kapacitet:null,kursCache:{},kontoCache:{},
    selectedKurs:null,kursDetail:null,selectedPerson:null,pendingCount:0,loginErr:'',loginLoading:false});
  render();
}

function role()   { return S.user?.roller[0]?.roll || null; }
function avdId()  { return S.user?.roller.find(r=>r.avdelning)?.avdelning?.id || null; }

// ─── DATA ────────────────────────────────────────────────────────────────────
async function loadBase() {
  const [avd,per,pers,kurs] = await Promise.all([
    api('/avdelningar'), api('/perioder'), api('/personal'), api('/kurser')
  ]);
  S.avdelningar=avd; S.perioder=per; S.personal=pers; S.kurser=kurs;
  S.pendingCount = kurs.filter(k=>+(k.bemannat_begard)>0).length;
}

async function ensureKap() {
  if (!S.kapacitet) S.kapacitet = await api('/personal/kapacitet?ar='+S.year);
}

async function loadKurs(id) {
  if (!S.kursCache[id]) S.kursCache[id] = await api('/kurser/'+id);
  S.kursDetail = S.kursCache[id];
}

async function loadKonto(id) {
  if (!S.kontoCache[id]) S.kontoCache[id] = await api('/personal/'+id+'/tidskonto?ar='+S.year);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fh = h => Math.round(+h||0)+'h';
const fp = p => Math.round(+p||0)+'%';

function kursStatus(k) {
  const b=+(k.budget_timmar)||0, g=+(k.bemannat_godkand)||0, beg=+(k.bemannat_begard)||0;
  if (!b) return 'okand';
  if (g>=b) return 'full';
  if (g>0)  return 'partial';
  if (beg>0) return 'begard';
  return 'unstaffed';
}

function statusBadge(st) {
  return {full:'<span class="badge green">✓ Bemannad</span>',
    partial:'<span class="badge amber">△ Delvis</span>',
    begard:'<span class="badge blue">⏳ Begärd</span>',
    unstaffed:'<span class="badge red">✗ Ej bemannad</span>',
    okand:'<span class="badge gray">— Okänd budget</span>'}[st] || '<span class="badge gray">—</span>';
}

function asgBadge(st) {
  return {utkast:'<span class="badge gray">✏ Utkast</span>',
    begard:'<span class="badge blue">⏳ Begärd</span>',
    godkand:'<span class="badge green">✓ Godkänd</span>',
    nekad:'<span class="badge red">✗ Nekad</span>'}[st] || `<span class="badge gray">${st}</span>`;
}

function avCol(id) {
  return ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899'][(id||0)%7];
}

function av(p,sz=32) {
  return `<div class="avatar" style="width:${sz}px;height:${sz}px;background:${avCol(p.id||p.person_id)}">${p.initialer}</div>`;
}

function periodName(id) {
  return (S.perioder||[]).find(p=>p.id===id)?.namn || '—';
}

function roleName(r) {
  return {sysadmin:'Sysadmin',prefekt:'Prefekt',avdc:'Avdelningschef',
    str_roll:'Studierektor',ekonom:'Ekonom',larare:'Lärare',hr:'HR/Admin'}[r]||r;
}

function navItems() {
  const r = role();
  return [
    {id:'dashboard', icon:'📊', label:'Dashboard',       roles:['sysadmin','prefekt','avdc','str_roll','ekonom','larare','hr']},
    {id:'bemanning', icon:'📋', label:'Bemanning',        roles:['sysadmin','prefekt','avdc','str_roll']},
    {id:'kapacitet', icon:'👥', label:'Kapacitetskarta',  roles:['sysadmin','prefekt','avdc','str_roll']},
    {id:'rapporter', icon:'🔍', label:'Rapporter',        roles:['sysadmin','prefekt','avdc','hr','ekonom']},
    {id:'personal',  icon:'🗂', label:'Personal',         roles:['sysadmin','prefekt','hr','avdc']},
    {id:'budget',    icon:'💰', label:'Budget & uppdrag', roles:['sysadmin','ekonom','prefekt']},
  ].filter(i => !r || i.roles.includes(r));
}

// ─── RENDER: LOGIN ───────────────────────────────────────────────────────────
function renderLogin() {
  return `<div class="login-wrap"><div class="login-card">
    <h1>UUP <span>BEMANNING</span></h1>
    <div class="sub">Universitets Undervisningsplanering · v${VERSION}</div>
    ${S.loginErr?`<div class="login-err">⚠ ${S.loginErr}</div>`:''}
    <label>E-post</label>
    <input id="l-e" type="email" placeholder="din@email.se" autocomplete="username"/>
    <label>Lösenord</label>

const loading = () => `<div class="loading"><div class="spinner"></div><span>Laddar…</span></div>`;

// ─── RENDER: DASHBOARD ───────────────────────────────────────────────────────
function renderDashboard() {
  const ks=S.kurser||[], ps=S.personal||[];
  const full=ks.filter(k=>kursStatus(k)==='full').length;
  const ej  =ks.filter(k=>kursStatus(k)==='unstaffed').length;
  const del =ks.filter(k=>kursStatus(k)==='partial').length;
  const pend=ks.filter(k=>+(k.bemannat_begard)>0).length;
  const und =ps.filter(p=>p.personalkategori==='undervisande'&&p.kategori_typ==='anstalld').length;

  const alerts=[];
  if (ej>0)   alerts.push({c:'red',  i:'✗', t:`${ej} kurs${ej>1?'er':''} saknar lärare`,
    b:ks.filter(k=>kursStatus(k)==='unstaffed').map(k=>k.namn).join(' · ')});
  if (del>0)  alerts.push({c:'amber',i:'△', t:`${del} kurs${del>1?'er':''} delvis bemannad${del>1?'e':''}`,
    b:ks.filter(k=>kursStatus(k)==='partial').map(k=>k.namn).join(' · ')});
  if (pend>0) alerts.push({c:'blue', i:'⏳',t:`${pend} begäran väntar på godkännande`,
    b:'Gå till Bemanning eller Kapacitetskarta för att granska.'});

  const rows = ks.slice(0,8).map(k=>`<tr class="clickable-row" onclick="navigate('bemanning');setTimeout(()=>selectKurs(${k.id}),80)">
    <td><span class="badge gray" style="font-size:10px">${periodName(k.period_id)}</span></td>
    <td style="font-weight:600">${k.namn}</td>
    <td>${statusBadge(kursStatus(k))}</td>
    <td style="color:var(--t3)">${fh(k.bemannat_godkand)} / ${+(k.budget_timmar)?fh(k.budget_timmar):'?h'}</td>
  </tr>`).join('');

  return `<div class="page-title">Dashboard</div>
    <div class="page-sub">Institutionen för pedagogik och specialpedagogik · ${S.year}</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Personal</div><div class="stat-value">${ps.length}</div><div class="stat-sub">${und} undervisande anst.</div></div>
      <div class="stat-card"><div class="stat-label">Kurser</div><div class="stat-value">${ks.length}</div><div class="stat-sub">${full} fullt bemannade</div></div>
      <div class="stat-card red"><div class="stat-label">Ej bemannade</div><div class="stat-value">${ej}</div><div class="stat-sub">${del} delvis bemannade</div></div>
      <div class="stat-card ${pend>0?'amber':''}"><div class="stat-label">Begärda → väntar</div><div class="stat-value">${pend}</div><div class="stat-sub">begäran hos AVDC</div></div>
    </div>
    ${alerts.map(a=>`<div class="alert ${a.c}"><div class="alert-icon">${a.i}</div><div><div class="alert-title">${a.t}</div><div class="alert-body">${a.b}</div></div></div>`).join('')}
    <div class="section-title" style="margin-top:20px">Kursöversikt</div>
    <table><thead><tr><th>Period</th><th>Kurs</th><th>Status</th><th>Timmar</th></tr></thead>
    <tbody>${rows}</tbody></table>
    ${ks.length>8?`<div style="text-align:center;margin-top:12px"><span style="color:var(--blue);font-size:12px;cursor:pointer" onclick="navigate('bemanning')">Visa alla ${ks.length} kurser →</span></div>`:''}`;
}

// ─── RENDER: BEMANNING ───────────────────────────────────────────────────────
function renderBemanning() {
  const ks=S.kurser||[];
  const cnt={all:ks.length,unstaffed:ks.filter(k=>kursStatus(k)==='unstaffed').length,
    partial:ks.filter(k=>kursStatus(k)==='partial').length,begard:ks.filter(k=>kursStatus(k)==='begard').length};
  const filt = S.bemanFilter==='all' ? ks : ks.filter(k=>kursStatus(k)===S.bemanFilter);

  const list = filt.length>0 ? filt.map(k=>`
    <div class="course-row ${S.selectedKurs===k.id?'selected':''}" onclick="selectKurs(${k.id})">
      <div class="cr-body">
        <div class="cr-name">${k.namn}</div>
        <div class="cr-meta">${k.kod} · ${periodName(k.period_id)} · ${k.hp}hp · ${fh(k.bemannat_godkand)}/${+(k.budget_timmar)?fh(k.budget_timmar):'?h'}</div>
      </div>
      <div class="cr-right">${statusBadge(kursStatus(k))}</div>
    </div>`).join('')
  : `<div class="empty-state"><div class="empty-icon">📋</div><div>Inga kurser matchar</div></div>`;

  const detail = S.kursDetail
    ? renderKursDetail(S.kursDetail)
    : `<div class="empty-state"><div class="empty-icon">📋</div>
       <div style="color:var(--t3);font-weight:600">Välj en kurs</div>
       <div style="font-size:12px">Klicka i listan för att se detaljer</div></div>`;

  return `<div class="page-title">Bemanning</div>
    <div class="page-sub">Tilldela lärare · Godkännandeflöde BEGÄRD → GODKÄND</div>
    <div class="filter-bar">
      ${[['all',`Alla (${cnt.all})`],['unstaffed',`Ej bemannade (${cnt.unstaffed})`],['partial',`Delvis (${cnt.partial})`],['begard',`Begärda (${cnt.begard})`]]
        .map(([v,l])=>`<button class="filter-btn ${S.bemanFilter===v?'active':''}" onclick="setBemanFilter('${v}')">${l}</button>`).join('')}
    </div>
    <div class="bem-layout">
      <div class="bem-list">${list}</div>
      <div class="bem-detail">${detail}</div>
    </div>`;
}

function renderKursDetail(k) {
  const budget=+(k.budget_timmar)||0, god=+(k.bemannat_godkand)||0, beg=+(k.bemannat_begard)||0;
  const pct = budget>0 ? Math.min(100,Math.round(god/budget*100)) : 0;
  const begPct = budget>0 ? Math.min(100-pct,Math.round(beg/budget*100)) : 0;
  const r = role();
  const canApprove = ['avdc','sysadmin','prefekt'].includes(r);
  const canAssign  = ['str_roll','sysadmin','prefekt','avdc'].includes(r);

  const bRow = (b,canApp) => {
    const p=b.person;
    return `<div class="teacher-row">
      ${av(p,28)}
      <div class="teacher-info"><div class="teacher-name">${p.namn}</div>
        <div class="teacher-meta">${p.titel_display||''} · ${fh(b.timmar)}${b.timtyp?' ('+b.timtyp+')':''}</div></div>
      ${asgBadge(b.status)}
      ${canApp&&b.status==='begard'
        ? `<button class="btn-sm" title="Godkänn" onclick="approveAsg(${b.id},true)">✓</button>
           <button class="btn-sm" title="Neka" style="color:var(--red)" onclick="approveAsg(${b.id},false)">✗</button>`
        : `<button class="btn-sm" title="Ta bort" onclick="deleteAsg(${b.id})">✕</button>`}
    </div>`;
  };
  const godkanda=(k.belaggningar||[]).filter(b=>b.status==='godkand');
  const begarda =(k.belaggningar||[]).filter(b=>b.status==='begard');
  const utkast  =(k.belaggningar||[]).filter(b=>b.status==='utkast');

  return `<div class="detail-pad">
    <div class="detail-kurs-title">${k.namn}</div>
    <div class="detail-kurs-meta">${k.kod} · ${periodName(k.period_id)} · ${k.hp} hp${k.studenter?' · '+k.studenter+' stud.':''}</div>
    ${statusBadge(kursStatus(k))}
    <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:12px 0 4px;position:relative">
      <div style="height:100%;width:${pct}%;background:var(--green);position:absolute;border-radius:4px"></div>
      ${begPct>0?`<div style="height:100%;left:${pct}%;width:${begPct}%;background:var(--amber);position:absolute"></div>`:''}
    </div>
    <div style="font-size:11px;color:var(--t4)">${pct}% · ${fh(god)} godkänd${beg>0?' + '+fh(beg)+' begärd':''} / ${budget?fh(budget):'?h'}</div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">Budget</div><div class="info-cell-value">${budget?fh(budget):'—'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Godkänd</div><div class="info-cell-value" style="color:var(--green)">${fh(god)}</div></div>
    </div>
    ${godkanda.length?`<div class="section-title">✓ Godkända (${godkanda.length})</div>${godkanda.map(b=>bRow(b,canApprove)).join('')}`:''}
    ${begarda.length?`<div class="section-title">⏳ Begärda (${begarda.length})</div>${begarda.map(b=>bRow(b,canApprove)).join('')}`:''}
    ${utkast.length?`<div class="section-title">✏ Utkast (${utkast.length})</div>${utkast.map(b=>bRow(b,false)).join('')}`:''}
    ${canAssign?`<button class="btn-add" onclick="openPicker(${k.id})">+ Tilldela lärare</button>`:''}
  </div>`;
}

// ─── RENDER: KAPACITET ───────────────────────────────────────────────────────
function renderKapacitet() {
  if (!S.kapacitet) return `<div class="page-title">Kapacitetskarta</div><div class="page-sub">Tillgänglig undervisningstid</div>${loading()}`;

  let data = S.kapacitet.filter(p=>p.personalkategori==='undervisande');
  if (S.kapFilter) data=data.filter(p=>p.avdelning_id===S.kapFilter);
  if (S.kapSearch) {
    const q=S.kapSearch.toLowerCase();
    data=data.filter(p=>p.namn.toLowerCase().includes(q)||(p.avdelning_namn||'').toLowerCase().includes(q));
  }

  const avdBtns = (S.avdelningar||[]).filter(a=>!['ADM','FU'].includes(a.kortnamn))
    .map(a=>`<button class="filter-btn ${S.kapFilter===a.id?'active':''}" onclick="setKapFilter(${a.id})">${a.kortnamn}</button>`).join('');

  const rows = data.map(p=>{
    const avail=+(p.tillganglig_undervisning)||0, god=+(p.undervisning_godkand)||0, beg=+(p.undervisning_begard)||0;
    const gPct=avail>0?Math.min(100,god/avail*100):0, bPct=avail>0?Math.min(100-gPct,beg/avail*100):0;
    const belagd=+(p.belaggningspct)||0, over=god>avail;
    const sel=S.selectedPerson===p.person_id;
    return `<div class="kap-row" style="${sel?'background:var(--bg2);outline:1px solid var(--blue)':''}" onclick="selectPerson(${p.person_id})">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--t1)">${p.namn}</div>
        <div style="font-size:10px;color:var(--t4)">${p.titel_display||''} · ${p.avdelning_namn||'Extern'}</div>
      </div>
      <div>
        <div class="kap-bar-wrap">
          <div class="kap-bar-fill kap-bar-godkand" style="width:${gPct}%"></div>
          ${bPct>0?`<div class="kap-bar-fill kap-bar-begard" style="left:${gPct}%;width:${bPct}%"></div>`:''}
        </div>
        <div style="font-size:10px;color:var(--t4);margin-top:3px">${fh(god)} godkänd${beg>0?' + '+fh(beg)+' begärd':''} / ${fh(avail)} tillg.
          ${over?'<span style="color:var(--red);font-weight:700"> ⚠ Övertid</span>':''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:700;color:${over?'var(--red)':belagd>90?'var(--amber)':'var(--t1)'}">${fp(belagd)}</div>
        <div style="font-size:10px;color:var(--t4)">belagd</div>
      </div>
    </div>`;
  }).join('');

  const panel = S.selectedPerson ? renderPersonPanel(S.selectedPerson) : '';

  return `<div class="page-title">Kapacitetskarta</div>
    <div class="page-sub">Tillgänglig undervisningstid · ${S.year}</div>
    <div class="filter-bar">
      <button class="filter-btn ${!S.kapFilter?'active':''}" onclick="setKapFilter(null)">Alla</button>
      ${avdBtns}
    </div>
    <input style="width:240px;margin-bottom:12px;padding:7px 12px;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;color:var(--t1);font-size:13px;outline:none"
      placeholder="Sök person…" value="${S.kapSearch}" oninput="S.kapSearch=this.value;rc()"/>
    <div class="kap-legend">
      <div class="kap-legend-item"><div class="kap-dot" style="background:var(--green)"></div>Godkänd</div>
      <div class="kap-legend-item"><div class="kap-dot" style="background:var(--amber)"></div>Begärd</div>
      <div class="kap-legend-item"><div class="kap-dot" style="background:var(--bg3)"></div>Tillgänglig</div>
    </div>
    <div style="display:grid;grid-template-columns:${panel?'1fr 310px':'1fr'};gap:20px;align-items:start">
      <div>${rows||'<div class="empty-state"><div class="empty-icon">👥</div><div>Ingen personal matchar</div></div>'}</div>
      ${panel?`<div style="position:sticky;top:0">${panel}</div>`:''}
    </div>`;
}

function renderPersonPanel(personId) {
  const konto  = S.kontoCache[personId];
  const person = (S.kapacitet||[]).find(p=>p.person_id===personId);
  if (!konto||!person) return `<div class="tidskonto-wrap">${loading()}</div>`;

  const udRows = (konto.uppdrag_detaljer||[]).map(u=>
    `<div class="tk-row"><span class="tk-label" style="padding-left:10px">↳ ${u.namn}</span><span class="tk-value" style="color:var(--amber)">-${fh(u.timmar)}</span></div>`
  ).join('');

  const r=role(), canApprove=['avdc','sysadmin','prefekt'].includes(r);
  const pending=[];
  Object.values(S.kursCache).forEach(k=>{
    (k.belaggningar||[]).forEach(b=>{
      if (b.person_id===personId && b.status==='begard') pending.push({k,b});
    });
  });

  return `<div>
    <div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:12px">${person.namn}</div>
    <div class="tidskonto-wrap">
      <div class="section-title" style="margin-top:0">Tidskonto ${S.year}</div>
      <div class="tk-row"><span class="tk-label">Bruttotid</span><span class="tk-value">${fh(konto.brutto_timmar)}</span></div>
      <div class="tk-row"><span class="tk-label">− Semester</span><span class="tk-value" style="color:var(--t4)">-${fh(konto.semester_timmar)}</span></div>
      <div class="tk-row"><span class="tk-label">Tjänstgöringsgrad</span><span class="tk-value">${konto.tjanstgoringspct}%</span></div>
      <div class="tk-row"><span class="tk-label">Justerad heltidsbas</span><span class="tk-value">${fh(konto.justerad_heltidsbas)}</span></div>
      ${+(konto.franvaro_timmar)>0?`<div class="tk-row"><span class="tk-label">− Frånvaro</span><span class="tk-value" style="color:var(--t4)">-${fh(konto.franvaro_timmar)}</span></div>`:''}
      <div class="tk-row" style="font-weight:700"><span class="tk-label">Netto bemanningsbar</span><span class="tk-value">${fh(konto.netto_bemanningsbar)}</span></div>
      <div class="tk-row"><span class="tk-label">− FOK (${konto.fok_pct}%)</span><span class="tk-value" style="color:var(--purple)">-${fh(konto.fok_timmar)}</span></div>
      <div class="tk-row"><span class="tk-label">− Kollegialt (${konto.kollegialt_pct}%)</span><span class="tk-value" style="color:var(--purple)">-${fh(konto.kollegialt_timmar)}</span></div>
      ${udRows}
      <div class="tk-row" style="background:var(--bg3);border-radius:5px;padding:7px;margin-top:4px">
        <span class="tk-label" style="color:var(--t1);font-weight:700">Tillgänglig undervisning</span>
        <span class="tk-value" style="color:var(--green)">${fh(konto.tillganglig_undervisning)}</span>
      </div>
      <div class="tk-row"><span class="tk-label">✓ Godkänd</span><span class="tk-value" style="color:var(--green)">${fh(konto.undervisning_godkand)}</span></div>
      ${+(konto.undervisning_begard)>0?`<div class="tk-row"><span class="tk-label">⏳ Begärd</span><span class="tk-value" style="color:var(--amber)">${fh(konto.undervisning_begard)}</span></div>`:''}
      <div class="tk-row"><span class="tk-label">Återstår (ink. begärd)</span>
        <span class="tk-value" style="color:${+(konto.aterstaar_inkl_begard)<0?'var(--red)':'var(--t1)'}">${fh(konto.aterstaar_inkl_begard)}</span></div>
    </div>
    ${pending.length>0?`<div class="section-title">⏳ Begärda (${pending.length})</div>
      ${pending.map(({k,b})=>`<div class="pending-item">
        <div class="pending-kurs">${k.namn}</div>
        <div class="pending-meta">${fh(b.timmar)} · ${periodName(k.period_id)} · ${k.kod}</div>
        ${canApprove?`<div class="pending-actions">
          <button class="btn-approve" onclick="approveAsg(${b.id},true)">✓ Godkänn</button>
          <button class="btn-reject" onclick="approveAsg(${b.id},false)">✗ Neka</button>
        </div>`:''}
      </div>`).join('')}`:''}
    <button style="width:100%;margin-top:8px;background:none;border:1px solid var(--bg3);border-radius:6px;padding:7px;color:var(--t4);font-size:12px;cursor:pointer" onclick="S.selectedPerson=null;rc()">Stäng ×</button>
  </div>`;
}

// ─── RENDER: PERSONAL ────────────────────────────────────────────────────────

// ─── RENDER: BUDGET ──────────────────────────────────────────────────────────
function renderBudget() {
  const ks=S.kurser||[], SNL=450;
  const tB=ks.reduce((s,k)=>s+(+(k.budget_timmar)||0),0);
  const tG=ks.reduce((s,k)=>s+(+(k.bemannat_godkand)||0),0);
  return `<div class="page-title">Budget & uppdrag</div>
    <div class="page-sub">Undervisningskostnader · Snittpris ${SNL} kr/h</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Budget totalt</div><div class="stat-value">${fh(tB)}</div><div class="stat-sub">${Math.round(tB*SNL/1000)} tkr est.</div></div>
      <div class="stat-card green"><div class="stat-label">Planerad kostnad</div><div class="stat-value">${Math.round(tG*SNL/1000)} tkr</div><div class="stat-sub">${fh(tG)} godkänd</div></div>
      <div class="stat-card"><div class="stat-label">Utnyttjande</div><div class="stat-value">${tB>0?fp(Math.round(tG/tB*100)):'—'}</div></div>
      <div class="stat-card amber"><div class="stat-label">Ej planerat</div><div class="stat-value">${fh(tB-tG)}</div><div class="stat-sub">${Math.round((tB-tG)*SNL/1000)} tkr risk</div></div>
    </div>
    <table><thead><tr><th>Kurs</th><th>Period</th><th>Budget</th><th>Godkänd</th><th>Est. kostnad</th></tr></thead>
    <tbody>${ks.map(k=>{const b=+(k.budget_timmar)||0,g=+(k.bemannat_godkand)||0;return`<tr>
      <td style="font-weight:600">${k.namn}</td>
      <td><span class="badge gray" style="font-size:10px">${periodName(k.period_id)}</span></td>
      <td>${fh(b)}</td><td style="color:${g>=b&&b>0?'var(--green)':'var(--t3)'}">${fh(g)}</td>
      <td style="color:var(--t4)">${b?Math.round(b*SNL/1000)+' tkr':'—'}</td>
    </tr>`;}).join('')}</tbody></table>`;
}

// ─── RENDER: RAPPORTER ───────────────────────────────────────────────────────
function renderRapporter() {
  if (!S.kapacitet) return `<div class="page-title">Rapporter</div><div class="page-sub">Kapacitetsrapport</div>${loading()}`;
  const data=S.kapacitet.filter(p=>p.personalkategori==='undervisande'&&p.kategori_typ==='anstalld');
  return `<div class="page-title">Rapporter</div>
    <div class="page-sub">Kapacitetsrapport · Undervisande personal · ${S.year}</div>
    <table><thead><tr><th>Namn</th><th>Titel</th><th>Avdelning</th><th>Netto</th><th>Godkänd</th><th>Belagd%</th><th>Återstår</th></tr></thead>
    <tbody>${data.map(p=>{const bl=+(p.belaggningspct)||0,at=+(p.aterstaar)||0;return`<tr>
      <td style="font-weight:600">${p.namn}</td>
      <td style="font-size:11px;color:var(--t4)">${p.titel_display||'—'}</td>
      <td>${p.avdelning_namn||'—'}</td>
      <td>${fh(p.netto_bemanningsbar)}</td>
      <td style="color:var(--green)">${fh(p.undervisning_godkand)}</td>
      <td style="color:${bl>100?'var(--red)':bl>90?'var(--amber)':'var(--t1)'}">${fp(bl)}</td>
      <td style="color:${at<0?'var(--red)':'var(--t3)'}">${fh(at)}</td>
    </tr>`;}).join('')}</tbody></table>`;
}

// ─── PICKER ──────────────────────────────────────────────────────────────────
function renderPicker() {
  const kurs=(S.kurser||[]).find(k=>k.id===S.pickerKursId);
  if (!kurs) return '';
  const q=S.pickerSearch.toLowerCase();
  let cands=(S.kapacitet||[]).filter(p=>p.personalkategori==='undervisande');
  if (q) cands=cands.filter(p=>p.namn.toLowerCase().includes(q)||(p.avdelning_namn||'').toLowerCase().includes(q));
  cands.sort((a,b)=>+(b.aterstaar_inkl_begard)- +(a.aterstaar_inkl_begard));
  const t=S.pickerTimmar||60;

  return `<div class="modal-bg" onclick="if(event.target===this)closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Tilldela lärare — ${kurs.namn}</div>
        <button class="modal-close" onclick="closePicker()">×</button>
      </div>
      <div class="modal-body">
        <input class="picker-search" placeholder="Sök lärare eller avdelning…" value="${S.pickerSearch}"
          oninput="S.pickerSearch=this.value;refreshPicker()"/>
        ${cands.length>0?cands.map(p=>{
          const rem=+(p.aterstaar_inkl_begard)||0;
          const cls=rem>=t*1.5?'cap-ok':rem>=t?'cap-warn':'cap-over';
          return `<div class="picker-person-row ${S.pickerPersonId===p.person_id?'selected':''}" onclick="pickerSel(${p.person_id})">
            ${av(p,28)}
            <div class="teacher-info"><div class="teacher-name">${p.namn}</div>
              <div class="teacher-meta">${p.titel_display||''} · ${p.avdelning_namn||'Extern'}</div></div>
            <div class="picker-cap"><div class="picker-cap-val ${cls}">${fh(rem)}</div><div class="picker-cap-label">återstår</div></div>
          </div>`;}).join('')
        :'<div style="text-align:center;color:var(--t4);padding:20px">Ingen match</div>'}
        <div class="hours-row">
          <label>Timmar:</label>
          <input class="hours-input" id="pk-t" type="number" min="1" max="500" value="${t}"
            oninput="S.pickerTimmar=parseInt(this.value)||60;refreshPicker()"/>
          <select id="pk-typ" class="sel">
            <option value="">Allmän</option>
            <option value="forelasning">Föreläsning</option>
            <option value="seminarium">Seminarium</option>
            <option value="examination">Examination</option>
            <option value="handledning">Handledning</option>
          </select>
          <select id="pk-st" class="sel">
            <option value="begard">Begär (→ AVDC)</option>
            <option value="utkast">Utkast</option>
            <option value="godkand">Godkänn direkt</option>
          </select>
        </div>
        ${S.pickerValMsg?`<div class="val-msg ${S.pickerValMsg.typ==='fel'?'err':'warn'}">${S.pickerValMsg.meddelande}</div>`:''}
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closePicker()">Avbryt</button>
        <button class="btn-confirm" onclick="confirmAssign()" ${!S.pickerPersonId?'disabled':''}>Tilldela</button>
      </div>
    </div>
  </div>`;
}

function refreshPicker() {
  const e=document.querySelector('.modal-bg');
  if (!e) return;
  const t=document.createElement('div');
  t.innerHTML=renderPicker();
  e.replaceWith(t.firstChild);
}

async function openPicker(kursId) {
  S.pickerKursId=kursId; S.pickerPersonId=null; S.pickerTimmar=60;
  S.pickerStatus='begard'; S.pickerSearch=''; S.pickerValMsg=null;
  if (!S.kapacitet) {
    document.getElementById('app').insertAdjacentHTML('beforeend',
      `<div class="modal-bg"><div class="loading"><div class="spinner"></div><span>Laddar kapacitet…</span></div></div>`);
    await ensureKap();
    document.querySelector('.modal-bg')?.remove();
  }
  document.getElementById('app').insertAdjacentHTML('beforeend', renderPicker());
}

function closePicker() { document.querySelector('.modal-bg')?.remove(); }

function pickerSel(id) {
  S.pickerPersonId=id; S.pickerValMsg=null;
  refreshPicker();
  // async validation in background
  api(`/personal/${id}/validera?timmar=${S.pickerTimmar}&ar=${S.year}`)
    .then(res=>{ S.pickerValMsg=res.fel.length>0?res.fel[0]:null; refreshPicker(); })
    .catch(()=>{});
}

async function confirmAssign() {
  if (!S.pickerPersonId||!S.pickerKursId) return;
  const timtyp=document.getElementById('pk-typ')?.value||null;
  const status=document.getElementById('pk-st')?.value||'begard';
  try {
    await api('/kurser/belaggningar',{method:'POST',body:JSON.stringify({
      kurs_id:S.pickerKursId, person_id:S.pickerPersonId,
      timmar:S.pickerTimmar, timtyp:timtyp||null, status
    })});
    delete S.kursCache[S.pickerKursId];
    S.kurser=null; S.kapacitet=null;
    closePicker();
    await loadBase();
    if (S.selectedKurs===S.pickerKursId) await loadKurs(S.pickerKursId);
    render();
  } catch(e) {
    const msg=Array.isArray(e.detail)?e.detail[0]?.meddelande:(typeof e.detail==='string'?e.detail:'Fel vid tilldelning');
    S.pickerValMsg={typ:'fel',meddelande:msg};
    refreshPicker();
  }
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function navigate(view) { S.view=view; S.selectedKurs=null; S.kursDetail=null; S.selectedPerson=null; render(); }
function setBemanFilter(f) { S.bemanFilter=f; rc(); }
function setKapFilter(id)  { S.kapFilter=id; rc(); }

async function selectKurs(id) {
  S.selectedKurs=id; S.kursDetail=null; rc();
  await loadKurs(id); rc();
}

async function selectPerson(id) {
  if (S.selectedPerson===id) { S.selectedPerson=null; rc(); return; }
  S.selectedPerson=id; rc();
  await loadKonto(id);
  // load kurs details for any pending to show approve buttons
  for (const k of (S.kurser||[]).filter(k=>+(k.bemannat_begard)>0)) {
    if (!S.kursCache[k.id]) await loadKurs(k.id);
  }
  rc();
}

async function approveAsg(id, godkand) {
  await api('/kurser/belaggningar/'+id+'/status',{method:'PATCH',body:JSON.stringify({status:godkand?'godkand':'nekad'})});
  S.kurser=null; S.kursCache={}; S.kontoCache={}; S.kapacitet=null;
  await loadBase();
  if (S.selectedKurs) await loadKurs(S.selectedKurs);
  if (S.selectedPerson) await loadKonto(S.selectedPerson);
  rc();
}

async function deleteAsg(id) {
  await api('/kurser/belaggningar/'+id,{method:'DELETE'});
  S.kurser=null; S.kursCache={}; S.kontoCache={}; S.kapacitet=null;
  await loadBase();
  if (S.selectedKurs) await loadKurs(S.selectedKurs);
  rc();
}

// rc = render content only (faster for non-structural updates)
function rc() {
  const el=document.getElementById('content');
  if (el) el.innerHTML=currentView();
}

function currentView() {
  switch(S.view) {
    case 'dashboard': return renderDashboard();
    case 'bemanning': return renderBemanning();
    case 'kapacitet': return renderKapacitet();
    case 'personal':  return renderPersonal();
    case 'budget':    return renderBudget();
    case 'rapporter': return renderRapporter();
    default:          return renderDashboard();
  }
}

async function render() {
  const app=document.getElementById('app');
  if (!S.token||!S.user) { app.innerHTML=renderLogin(); return; }
  if (!S.kurser) {
    app.innerHTML=renderShell(loading());
    try { await loadBase(); } catch(e) { console.error(e); }
  }
  if ((S.view==='kapacitet'||S.view==='rapporter') && !S.kapacitet) {
    app.innerHTML=renderShell(loading());
    await ensureKap();
  }
  app.innerHTML=renderShell(currentView());
}

render();
</script>
</body>
</html>
