<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUP Bemanning</title>
<style>
:root{
  --bg0:#0a0f1a;--bg1:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --t1:#f1f5f9;--t2:#e2e8f0;--t3:#cbd5e1;--t4:#94a3b8;
  --blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
  --rad:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:40px;width:400px}
.login-card h1{font-size:22px;margin-bottom:4px}
.login-card h1 span{color:var(--blue)}
.login-sub{color:var(--t4);font-size:12px;margin-bottom:28px}
.lbl{display:block;color:var(--t3);font-size:11px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.txt{width:100%;background:var(--bg1);border:1px solid var(--bg3);border-radius:6px;padding:10px 12px;color:var(--t1);font-size:14px;margin-bottom:16px;outline:none}
.txt:focus{border-color:var(--blue)}
.btn-primary{width:100%;background:var(--blue);border:none;border-radius:6px;padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:#fca5a5;font-size:12px;margin-bottom:12px;padding:8px 10px;background:#2d1515;border-radius:5px;border:1px solid #7f1d1d}
.demo-accounts{margin-top:24px;padding-top:20px;border-top:1px solid var(--bg3)}
.demo-accounts p{color:var(--t4);font-size:11px;margin-bottom:10px}
.demo-btn{background:var(--bg1);border:1px solid var(--bg3);border-radius:5px;padding:5px 9px;color:var(--t3);font-size:11px;cursor:pointer;margin:2px 2px 0 0;display:inline-block}
.demo-btn:hover{border-color:var(--blue);color:var(--t1)}

/* Shell */
.topbar{background:var(--bg1);border-bottom:1px solid var(--bg2);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.app-title{font-weight:800;font-size:14px;letter-spacing:.08em}
.app-title span{color:var(--blue)}
.period-select{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--t3);cursor:pointer;outline:none}
.period-select:focus{border-color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:4px 10px 4px 4px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t3)}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.logout-btn{background:none;border:1px solid var(--bg3);border-radius:5px;padding:4px 10px;color:var(--t4);font-size:11px;cursor:pointer}
.logout-btn:hover{color:var(--t1);border-color:var(--t4)}

.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:195px;background:var(--bg0);border-right:1px solid var(--bg2);flex-shrink:0;overflow-y:auto}
.sidebar-section{padding:16px 12px 8px;color:var(--t4);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:var(--t3);cursor:pointer;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{background:var(--bg2);color:var(--t1)}
.nav-item.active{background:var(--bg2);color:var(--t1);border-left-color:var(--blue)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* Typography */
.page-title{font-size:18px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--t4);font-size:12px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:16px}
.stat-label{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;line-height:1}
.stat-sub{font-size:11px;color:var(--t4);margin-top:4px}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.amber .stat-value{color:var(--amber)}

/* Alerts */
.alert{border-radius:var(--rad);padding:10px 14px;margin-bottom:8px;display:flex;gap:10px}
.alert.red{background:#2d1515;border:1px solid #7f1d1d}
.alert.amber{background:#2d1f0a;border:1px solid #78350f}
.alert.blue{background:#0f1e3a;border:1px solid #1e3a6e}
.alert-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.alert-title{font-size:13px;font-weight:700;margin-bottom:1px}
.alert-body{font-size:12px;color:var(--t3)}

/* ── Generic sortable table ─────────────────────────────────────────────── */
.data-table-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table th{
  text-align:left;font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;
  letter-spacing:.06em;padding:9px 10px;border-bottom:1px solid var(--bg3);
  white-space:nowrap;user-select:none;background:var(--bg1);
}
.data-table th.sortable{cursor:pointer}
.data-table th.sortable:hover{color:var(--t2);background:var(--bg2)}
.data-table th.sort-active{color:var(--t2);background:var(--bg2)}
.sort-ic{margin-left:4px;opacity:.35;font-size:11px}
.sort-active .sort-ic{opacity:1;color:var(--blue)}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--bg1);font-size:13px;color:var(--t2);vertical-align:middle}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--bg3);cursor:pointer}
.data-table tbody tr.no-click:hover td{background:transparent;cursor:default}

/* ── Table toolbar ─────────────────────────────────────────────────────── */
.table-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toolbar-search{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:5px 12px 5px 30px;color:var(--t1);font-size:12px;outline:none;width:200px;position:relative}
.toolbar-search:focus{border-color:var(--blue)}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.filter-chip{background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:5px 12px;color:var(--t3);font-size:12px;cursor:pointer;white-space:nowrap}
.filter-chip:hover{border-color:var(--blue);color:var(--t1)}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.table-count{margin-left:auto;font-size:11px;color:var(--t4)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.green{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.badge.amber{background:#451a03;color:#fcd34d;border:1px solid #78350f}
.badge.red{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.badge.blue{background:#0f1e3a;color:#93c5fd;border:1px solid #1d4ed8}
.badge.gray{background:var(--bg1);color:var(--t4);border:1px solid var(--bg3)}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

/* Mini capacity bar (inline in table cell) */
.cap-cell{display:flex;align-items:center;gap:6px;min-width:120px}
.mini-bar{width:60px;height:5px;background:var(--bg3);border-radius:3px;position:relative;flex-shrink:0}
.mini-bar-god{position:absolute;top:0;height:100%;border-radius:3px;background:var(--green)}
.mini-bar-beg{position:absolute;top:0;height:100%;background:var(--amber)}

/* Kap legend */
.kap-legend{display:flex;gap:14px;margin-bottom:10px}
.kap-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t4)}
.kap-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Tidskonto */
.tk-wrap{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad);padding:14px}
.tk-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bg3)}
.tk-row:last-child{border-bottom:none}
.tk-label{font-size:12px;color:var(--t3)}
.tk-val{font-size:13px;font-weight:600}

/* Bemanning */
.bem-layout{display:grid;grid-template-columns:1fr 300px;gap:12px;height:calc(100vh - 148px)}
.bem-list{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.bem-detail{overflow-y:auto;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--rad)}
.course-row{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bg3);cursor:pointer}
.course-row:hover{background:var(--bg3)}
.course-row.selected{background:#1e3050;border-left:3px solid var(--blue);padding-left:9px}
.cr-body{flex:1;min-width:0}
.cr-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cr-meta{font-size:10px;color:var(--t3);margin-top:2px}
.cr-right{flex-shrink:0}

/* Detail pad */
.detail-pad{padding:16px}
.detail-title{font-size:16px;font-weight:700;margin-bottom:3px}
.detail-meta{font-size:12px;color:var(--t4);margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.info-cell{background:var(--bg1);border-radius:6px;padding:10px 12px}
.info-cell-label{font-size:10px;color:var(--t4);font-weight:700;text-transform:uppercase;margin-bottom:4px}
.info-cell-value{font-size:18px;font-weight:700}

/* Assignment rows in detail/overlay */
.asg-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg3)}
.asg-row:last-child{border-bottom:none}
.asg-info{flex:1;min-width:0}
.asg-name{font-size:13px;font-weight:600;cursor:pointer;color:var(--t1)}
.asg-name:hover{color:var(--blue);text-decoration:underline}
.asg-meta{font-size:11px;color:var(--t4)}
.btn-sm{background:var(--bg3);border:none;border-radius:5px;padding:5px 8px;font-size:11px;cursor:pointer;color:var(--t2)}
.btn-sm:hover{background:var(--blue);color:#fff}
.btn-sm.del:hover{background:var(--red)}
.btn-add{width:100%;background:transparent;border:1px dashed var(--bg3);border-radius:6px;padding:10px;color:var(--t4);font-size:13px;cursor:pointer;margin-top:10px;text-align:center}
.btn-add:hover{border-color:var(--blue);color:var(--blue);background:#0f1e3a}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:100px;padding:30px;text-align:center;color:var(--t4);gap:8px}
.empty-icon{font-size:30px;opacity:.4}

/* Person detail overlay */
.person-overlay{position:fixed;inset:0;background:var(--bg0);z-index:50;overflow-y:auto}
.person-overlay-inner{max-width:1020px;margin:0 auto;padding:20px 24px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--bg3);border-radius:6px;padding:6px 12px;color:var(--t4);font-size:12px;cursor:pointer;margin-bottom:16px}
.back-btn:hover{color:var(--t1);border-color:var(--t4)}
.person-overlay-grid{display:grid;grid-template-columns:255px 1fr;gap:20px;align-items:start}
.pov-left{position:sticky;top:20px}
.pending-item{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.pending-kurs{font-size:13px;font-weight:600;cursor:pointer}
.pending-kurs:hover{color:var(--blue);text-decoration:underline}
.pending-meta{font-size:11px;color:var(--t4);margin-top:2px}
.pending-actions{display:flex;gap:6px;margin-top:8px}
.btn-approve{background:#065f46;border:none;border-radius:5px;padding:6px 14px;color:#6ee7b7;font-size:12px;font-weight:600;cursor:pointer}
.btn-approve:hover{background:#047857}
.btn-reject{background:#450a0a;border:none;border-radius:5px;padding:6px 14px;color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer}
.btn-reject:hover{background:#7f1d1d}

/* Picker modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg1);border:1px solid var(--bg3);border-radius:12px;width:560px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--t4);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--t1)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--bg3);display:flex;justify-content:flex-end;gap:8px}
.picker-search{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 12px;color:var(--t1);font-size:13px;outline:none;margin-bottom:12px}
.picker-search:focus{border-color:var(--blue)}
.picker-row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.picker-row:hover{background:var(--bg2)}
.picker-row.selected{background:#0f1e3a;border-color:var(--blue)}
.picker-cap{margin-left:auto;text-align:right;flex-shrink:0}
.picker-cap-val{font-size:14px;font-weight:700}
.cap-ok{color:var(--green)} .cap-warn{color:var(--amber)} .cap-over{color:var(--red)}
.picker-cap-label{font-size:10px;color:var(--t4)}
.hours-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bg3);flex-wrap:wrap}
.hours-row label{font-size:12px;color:var(--t3);font-weight:600}
.hours-input{width:75px;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:7px 10px;color:var(--t1);font-size:14px;text-align:center;outline:none}
.hours-input:focus{border-color:var(--blue)}
.sel{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:7px 10px;color:var(--t1);font-size:13px;outline:none}
.val-msg{font-size:11px;padding:6px 10px;border-radius:5px;margin-top:8px}
.val-msg.err{background:#2d1515;color:#fca5a5;border:1px solid #7f1d1d}
.val-msg.warn{background:#2d1f0a;color:#fcd34d;border:1px solid #78350f}
.btn-cancel{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 18px;color:var(--t3);font-size:13px;cursor:pointer}
.btn-confirm{background:var(--blue);border:none;border-radius:6px;padding:8px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-confirm:hover{background:#2563eb}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:180px;gap:10px;color:var(--t4)}
.spinner{width:20px;height:20px;border:2px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* Edit form */
.edit-form{background:var(--bg1);border:1px solid var(--bg3);border-radius:10px;padding:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.wide{grid-template-columns:1fr}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.05em}
.form-input{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 11px;color:var(--t1);font-size:13px;outline:none;width:100%}
.form-input:focus{border-color:var(--blue)}
.form-select{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 11px;color:var(--t1);font-size:13px;outline:none;width:100%;cursor:pointer}
.form-select:focus{border-color:var(--blue)}
.form-section{margin:16px 0 8px;font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;padding-bottom:6px;border-bottom:1px solid var(--bg2)}
.form-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.btn-save{background:var(--blue);border:none;border-radius:6px;padding:8px 20px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#2563eb}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-edit{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:6px 14px;color:var(--t3);font-size:12px;cursor:pointer}
.btn-edit:hover{border-color:var(--blue);color:var(--blue)}
.form-msg{font-size:12px;padding:8px 12px;border-radius:5px;margin-top:8px}
.form-msg.ok{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.form-msg.err{background:#2d1515;color:#fca5a5;border:1px solid #7f1d1d}

/* Settings page */
.settings-section{background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg3)}
.settings-row:last-child{border-bottom:none}
.settings-key{flex:1}
.settings-key-name{font-size:13px;font-weight:600}
.settings-key-desc{font-size:11px;color:var(--t4);margin-top:2px}
.settings-val{width:100px;text-align:right}
.settings-input{width:90px;background:var(--bg1);border:1px solid var(--bg3);border-radius:5px;padding:5px 8px;color:var(--t1);font-size:14px;font-weight:700;text-align:right;outline:none}
.settings-input:focus{border-color:var(--blue)}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const API = '/api';
const VERSION = '0.2.4';

let S = {
  token: localStorage.getItem('uup_token'),
  user:  JSON.parse(localStorage.getItem('uup_user') || 'null'),
  view: 'dashboard',
  year: 2026,
  activePeriodId: null,
  // data
  avdelningar: null, perioder: null, personal: null, kurser: null, kapacitet: null,
  kursCache: {}, kontoCache: {}, belaggningsCache: {},
  // sort state: {k: fieldKey, d: 'asc'|'desc'}
  sortTeam: {k:'belaggningspct', d:'desc'},
  sortKap:  {k:'belaggningspct', d:'desc'},
  sortPers: {k:'namn', d:'asc'},
  sortRapt: {k:'belaggningspct', d:'desc'},
  sortBudg: {k:'namn', d:'asc'},
  sortBem:  {k:'namn', d:'asc'},
  // filter/search state
  teamSearch:'', teamAvdFilter:null, teamKatFilter:'all',
  kapSearch:'', kapAvdFilter:null,
  persSearch:'', persKatFilter:'all',
  // bemanning
  selectedKurs:null, kursDetail:null, bemanFilter:'all', bemanSearch:'',
  // person overlay
  personOverlay:null, personBelList:null,
  personEditMode:false, personEditData:null,
  // picker
  pickerKursId:null, pickerPersonId:null, pickerTimmar:60,
  pickerStatus:'begard', pickerSearch:'', pickerValMsg:null,
  // installningar
  installningar:null, installSaving:false, installMsg:null,
  pendingCount:0, loginErr:'', loginLoading:false,
};

// ── API ─────────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(API+path, {
    ...opts,
    headers: {'Content-Type':'application/json',
      ...(S.token?{'Authorization':'Bearer '+S.token}:{}),
      ...(opts.headers||{})}
  });
  if (r.status===204) return null;
  const d = await r.json();
  if (!r.ok) throw d;
  return d;
}

// ── AUTH ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const epost=document.getElementById('l-e')?.value?.trim(), pw=document.getElementById('l-p')?.value;
  if (!epost||!pw) return;
  S.loginLoading=true; S.loginErr=''; render();
  try {
    const res=await api('/auth/login',{method:'POST',body:JSON.stringify({epost,losenord:pw})});
    S.token=res.access_token; S.user=res.anvandare;
    localStorage.setItem('uup_token',S.token); localStorage.setItem('uup_user',JSON.stringify(S.user));
    S.loginLoading=false;
    S.view='dashboard';
    await loadBase(); render();
  } catch(e) {
    S.loginErr=typeof e.detail==='string'?e.detail:'Inloggning misslyckades';
    S.loginLoading=false; render();
  }
}

function fillDemo(e){ document.getElementById('l-e').value=e; document.getElementById('l-p').value='demo1234'; }

function logout() {
  localStorage.removeItem('uup_token'); localStorage.removeItem('uup_user');
  Object.assign(S,{token:null,user:null,view:'dashboard',avdelningar:null,perioder:null,
    personal:null,kurser:null,kapacitet:null,kursCache:{},kontoCache:{},belaggningsCache:{},
    selectedKurs:null,kursDetail:null,personOverlay:null,personBelList:null,
    personEditMode:false,personEditData:null,installningar:null,installSaving:false,installMsg:null,
    pendingCount:0,loginErr:'',loginLoading:false,activePeriodId:null,year:2026,
    teamSearch:'',kapSearch:'',persSearch:'',bemanSearch:''});
  render();
}

// ── DATA ─────────────────────────────────────────────────────────────────────
async function loadBase() {
  const [avd,per,pers,kurs] = await Promise.all([
    api('/avdelningar'), api('/perioder'), api('/personal'), api('/kurser')
  ]);
  S.avdelningar=avd; S.perioder=per; S.personal=pers; S.kurser=kurs;
  if (!S.activePeriodId && per.length) {
    const fy=per.filter(p=>p.typ==='kalenderar').sort((a,b)=>b.start_datum.localeCompare(a.start_datum))[0];
    if (fy) { S.activePeriodId=fy.id; S.year=parseInt(fy.start_datum.substring(0,4)); }
  }
  S.pendingCount=kurs.filter(k=>+(k.bemannat_begard)>0).length;
}

async function ensureKap() {
  if (!S.kapacitet) S.kapacitet=await api('/personal/kapacitet?ar='+S.year);
}

async function loadKurs(id) {
  if (!S.kursCache[id]) S.kursCache[id]=await api('/kurser/'+id);
  S.kursDetail=S.kursCache[id];
}

async function loadKonto(id) {
  const k=id+'_'+S.year;
  if (!S.kontoCache[k]) S.kontoCache[k]=await api('/personal/'+id+'/tidskonto?ar='+S.year);
  return S.kontoCache[k];
}

async function loadPersonBel(id) {
  const k=id+'_'+S.year;
  if (!S.belaggningsCache[k]) S.belaggningsCache[k]=await api('/personal/'+id+'/belaggningar?ar='+S.year);
  return S.belaggningsCache[k];
}

function invalidate() {
  S.kurser=null; S.kursCache={}; S.kontoCache={}; S.belaggningsCache={}; S.kapacitet=null;
}

// ── SORT / FILTER HELPERS ────────────────────────────────────────────────────

// Sort an array by key+direction
function srt(arr, k, d) {
  return [...arr].sort((a,b)=>{
    let av=a[k]??'', bv=b[k]??'';
    if (typeof av==='number'||typeof bv==='number'){av=+av||0;bv=+bv||0;return d==='asc'?av-bv:bv-av;}
    return d==='asc'?String(av).localeCompare(String(bv),'sv'):String(bv).localeCompare(String(av),'sv');
  });
}

// Toggle sort for a named sort state key
function tsort(stateKey, colKey) {
  const st=S[stateKey];
  S[stateKey]=st.k===colKey?{k:colKey,d:st.d==='asc'?'desc':'asc'}:{k:colKey,d:'asc'};
  rc();
}

// Render a sortable <th>
function th(label, colKey, stateKey, extraStyle='') {
  const {k,d}=S[stateKey], active=k===colKey;
  const ic=active?(d==='asc'?'↑':'↓'):'↕';
  return `<th class="sortable${active?' sort-active':''}" style="${extraStyle}" onclick="tsort('${stateKey}','${colKey}')">
    ${label}<span class="sort-ic">${ic}</span>
  </th>`;
}

// Mini capacity bar for table cells
function miniBar(god, beg, avail) {
  const g=+god||0, be=+beg||0, a=+avail||0;
  if (!a) return '<span style="color:var(--t4)">—</span>';
  const gp=Math.min(100,g/a*100), bp=Math.min(100-gp,be/a*100);
  return `<div class="mini-bar">
    <div class="mini-bar-god" style="width:${gp}%"></div>
    ${bp>0?`<div class="mini-bar-beg" style="left:${gp}%;width:${bp}%"></div>`:''}
  </div>`;
}

// Period change
function onPeriodChange(val) {
  if (val==='all') { S.activePeriodId=null; }
  else {
    const pid=parseInt(val); S.activePeriodId=pid;
    const p=(S.perioder||[]).find(p=>p.id===pid);
    if (p) {
      const yr=parseInt(p.start_datum.substring(0,4));
      if (yr!==S.year){S.year=yr;S.kapacitet=null;S.kontoCache={};S.belaggningsCache={};}
    }
  }
  rc();
}

function filteredKurser() {
  const ks=S.kurser||[];
  if (!S.activePeriodId) return ks;
  const sel=(S.perioder||[]).find(p=>p.id===S.activePeriodId);
  if (!sel) return ks;
  // Include courses from any period that overlaps with the selected period
  const overlap=new Set((S.perioder||[])
    .filter(p=>p.start_datum<=sel.slut_datum && p.slut_datum>=sel.start_datum)
    .map(p=>p.id));
  return ks.filter(k=>overlap.has(k.period_id));
}

// ── PERSON CAPACITY TABLE (shared by Mitt team + Kapacitetskarta) ─────────────
// Returns rows of the data-table for person capacity, after sort+filter
function personCapRows(data, sortKey, noAvd) {
  const {k,d}=S[sortKey];
  const sorted=srt(data,k,d);
  return sorted.map(p=>{
    const avail=+(p.tillganglig_undervisning)||0, god=+(p.undervisning_godkand)||0, beg=+(p.undervisning_begard)||0;
    const belagd=+(p.belaggningspct)||0, ater=+(p.aterstaar_inkl_begard)||0;
    const over=god>avail;
    return `<tr onclick="openPersonOverlay(${p.person_id})">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          ${av(p,26)}
          <div>
            <div style="font-weight:600;font-size:13px">${p.namn}</div>
            ${beg>0?`<div style="font-size:10px;color:var(--amber)">⏳ ${fh(beg)} begärd</div>`:''}
          </div>
        </div>
      </td>
      <td style="color:var(--t4);font-size:12px">${p.titel_display||'—'}</td>
      ${noAvd?'':`<td style="font-size:12px">${p.avdelning_namn||'—'}</td>`}
      <td>${fh(avail)}</td>
      <td>
        <div class="cap-cell">
          ${miniBar(god,beg,avail)}
          <span style="font-size:12px;color:var(--green)">${fh(god)}</span>
        </div>
      </td>
      <td style="font-size:14px;font-weight:700;color:${over?'var(--red)':belagd>90?'var(--amber)':'var(--t1)'}">${fp(belagd)}</td>
      <td style="color:${ater<0?'var(--red)':ater<50?'var(--amber)':'var(--t3)'};font-weight:${ater<0?'700':'400'}">${fh(ater)}</td>
    </tr>`;
  }).join('');
}

  // Filters

// ── RENDER: DASHBOARD (router) ────────────────────────────────────────────────
function renderDashboard() {
  const r=role();
  if (r==='avdc')     return renderDashAvdc();
  if (r==='str_roll') return renderDashStr();
  if (r==='prefekt')  return renderDashPrefekt();
  if (r==='sysadmin') return renderDashAdmin();
  return renderDashGeneric();
}

function _dashAlerts(ks, team) {
  const alerts=[];
  const ej=ks.filter(k=>kursStatus(k)==='unstaffed');
  const del=ks.filter(k=>kursStatus(k)==='partial');
  const pend=ks.filter(k=>+(k.bemannat_begard)>0);
  if (team) {
    const over=team.filter(p=>+(p.undervisning_godkand)>+(p.tillganglig_undervisning));
    const tPend=team.filter(p=>+(p.undervisning_begard)>0);
    if (over.length>0) alerts.push({c:'red',i:'⚠',t:`${over.length} person${over.length>1?'er':''} övertilldelad${over.length>1?'e':''}`,b:over.map(p=>p.namn).join(' · ')});
    if (tPend.length>0) alerts.push({c:'amber',i:'⏳',t:`${tPend.length} person${tPend.length>1?'er':''} med begärda timmar`,b:'Gå till Mitt team för att granska.'});
  }
  if (ej.length>0) alerts.push({c:'red',i:'✗',t:`${ej.length} kurs${ej.length>1?'er':''} saknar lärare`,b:ej.map(k=>k.namn).slice(0,5).join(' · ')});
  if (del.length>0) alerts.push({c:'amber',i:'△',t:`${del.length} kurs${del.length>1?'er':''} delvis bemannad${del.length>1?'e':''}`,b:del.map(k=>k.namn).slice(0,5).join(' · ')});
  if (!team&&pend.length>0) alerts.push({c:'blue',i:'⏳',t:`${pend.length} kurs${pend.length>1?'er':''} med begärd bemanning`,b:'Gå till Bemanning för att granska.'});
  return alerts.map(a=>`<div class="alert ${a.c}"><div class="alert-icon">${a.i}</div><div><div class="alert-title">${a.t}</div><div class="alert-body">${a.b}</div></div></div>`).join('');
}

function _kursTable(ks, limit) {
  const rows=(limit?ks.slice(0,limit):ks).map(k=>`<tr class="clickable-row" onclick="navigate('bemanning');setTimeout(()=>selectKurs(${k.id}),80)">
    <td><span class="badge gray" style="font-size:10px">${periodName(k.period_id)}</span></td>
    <td style="font-weight:600">${k.namn}</td>
    <td style="color:var(--t4)">${k.hp} hp</td>
    <td>${statusBadge(kursStatus(k))}</td>
    <td style="color:var(--t3)">${fh(k.bemannat_godkand)} / ${+(k.budget_timmar)?fh(k.budget_timmar):'?h'}</td>
  </tr>`).join('');
  return `<div class="data-table-wrap"><table class="data-table">
    <thead><tr><th>Period</th><th>Kurs</th><th>Poäng</th><th>Status</th><th>Timmar</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  ${limit&&ks.length>limit?`<div style="text-align:center;margin-top:8px"><span style="color:var(--blue);font-size:12px;cursor:pointer" onclick="navigate('bemanning')">Visa alla ${ks.length} kurser →</span></div>`:''}`;
}

function renderBemanning() {
  const ks=filteredKurser();
  const cnt={all:ks.length,unstaffed:ks.filter(k=>kursStatus(k)==='unstaffed').length,
    partial:ks.filter(k=>kursStatus(k)==='partial').length,begard:ks.filter(k=>kursStatus(k)==='begard').length};
  let filt=S.bemanFilter==='all'?ks:ks.filter(k=>kursStatus(k)===S.bemanFilter);
  if (S.bemanSearch){const q=S.bemanSearch.toLowerCase();filt=filt.filter(k=>k.namn.toLowerCase().includes(q)||k.kod.toLowerCase().includes(q));}

  const list=filt.length?filt.map(k=>`
    <div class="course-row ${S.selectedKurs===k.id?'selected':''}" onclick="selectKurs(${k.id})">
      <div class="cr-body">
        <div class="cr-name">${k.namn}</div>
        <div class="cr-meta">${k.kod} · ${periodName(k.period_id)} · ${k.hp}hp · ${fh(k.bemannat_godkand)}/${+(k.budget_timmar)?fh(k.budget_timmar):'?h'}</div>
      </div>
      <div class="cr-right">${statusBadge(kursStatus(k))}</div>
    </div>`).join('')
  :`<div class="empty-state"><div class="empty-icon">📋</div><div>Inga kurser matchar</div></div>`;

  const detail=S.kursDetail?renderKursDetail(S.kursDetail)
    :`<div class="empty-state"><div class="empty-icon">📋</div>
       <div style="color:var(--t3);font-weight:600">Välj en kurs</div>
       <div style="font-size:12px">Klicka i listan för att se detaljer</div></div>`;

  return `<div class="page-title">Bemanning</div>
    <div class="page-sub">Tilldela lärare · BEGÄRD → GODKÄND</div>
    <div class="table-toolbar" style="margin-bottom:8px">
      <div class="search-wrap">
        <input class="toolbar-search" placeholder="Sök kurs, kod…" value="${S.bemanSearch}" oninput="S.bemanSearch=this.value;rc()"/>
      </div>
      ${[['all',`Alla (${cnt.all})`],['unstaffed',`Ej bemannade (${cnt.unstaffed})`],['partial',`Delvis (${cnt.partial})`],['begard',`Begärda (${cnt.begard})`]]

    </div>
    <div class="bem-layout">
      <div class="bem-list">${list}</div>
      <div class="bem-detail">${detail}</div>
    </div>`;
}

function renderKursDetail(k) {
  const budget=+(k.budget_timmar)||0, god=+(k.bemannat_godkand)||0, beg=+(k.bemannat_begard)||0;
  const pct=budget>0?Math.min(100,Math.round(god/budget*100)):0;
  const begPct=budget>0?Math.min(100-pct,Math.round(beg/budget*100)):0;
  const r=role(), canApprove=['avdc','sysadmin','prefekt'].includes(r), canAssign=['str_roll','sysadmin','prefekt','avdc'].includes(r);
  const bRow=(b,showApprove)=>{const p=b.person;return`<div class="asg-row">
    ${av(p,26)}
    <div class="asg-info">
      <div class="asg-name" onclick="openPersonOverlay(${p.id})">${p.namn}</div>
      <div class="asg-meta">${p.titel_display||''} · ${fh(b.timmar)}${b.timtyp?' ('+b.timtyp+')':''}</div>
    </div>
    ${asgBadge(b.status)}
    ${showApprove&&b.status==='begard'
      ?`<button class="btn-sm" title="Godkänn" onclick="approveAsg(${b.id},true)">✓</button>
         <button class="btn-sm del" title="Neka" onclick="approveAsg(${b.id},false)">✗</button>`
      :`<button class="btn-sm del" title="Ta bort" onclick="deleteAsg(${b.id})">✕</button>`}
  </div>`;};

        </div>
      </div>`).join('')}

function installChanged() {
  S.installMsg = null;
  document.getElementById('inst-save-btn')?.removeAttribute('disabled');
}

async function saveInstallningar() {
  const keys = ['fok_pct_professor','fok_pct_docent','fok_pct_lektor','fok_pct_adjunkt',
                 'kollegialt_pct','brutto_timmar_35d','brutto_timmar_31d','brutto_timmar_28d'];
  const updates = {};
  for (const k of keys) {
    const el = document.getElementById('inst_'+k);
    if (el) updates[k] = el.value;
  }
  S.installSaving = true; rc();
  try {
    S.installningar = await api('/installningar', {method:'PUT', body:JSON.stringify({updates})});
    S.installMsg = {ok:true, text:'Inställningar sparade.'};
    // Clear tidskonto cache so recalculations pick up new values
    S.kontoCache = {}; S.kapacitet = null;
  } catch(e) {
    S.installMsg = {ok:false, text:'Fel vid sparning: '+(e.detail||'okänt fel')};
  }
  S.installSaving = false; rc();
}

// ── PICKER ────────────────────────────────────────────────────────────────────
function renderPicker() {
  const kurs=(S.kurser||[]).find(k=>k.id===S.pickerKursId); if (!kurs) return '';
  const q=S.pickerSearch.toLowerCase();
  let cands=(S.kapacitet||[]).filter(p=>p.personalkategori==='undervisande');
  if (q) cands=cands.filter(p=>p.namn.toLowerCase().includes(q)||(p.avdelning_namn||'').toLowerCase().includes(q));
  cands.sort((a,b)=>+(b.aterstaar_inkl_begard)- +(a.aterstaar_inkl_begard));
  const t=S.pickerTimmar||60;
  return `<div class="modal-bg" onclick="if(event.target===this)closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Tilldela person — ${kurs.namn}</div>
        <button class="modal-close" onclick="closePicker()">×</button>
      </div>
      <div class="modal-body">
        <input class="picker-search" placeholder="Sök lärare eller avdelning…" value="${S.pickerSearch}" oninput="S.pickerSearch=this.value;refreshPicker()"/>
        ${cands.map(p=>{const rem=+(p.aterstaar_inkl_begard)||0; const cls=rem>=t*1.5?'cap-ok':rem>=t?'cap-warn':'cap-over';
          return `<div class="picker-row ${S.pickerPersonId===p.person_id?'selected':''}" onclick="pickerSel(${p.person_id})">
            ${av(p,28)}<div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600">${p.namn}</div>
              <div style="font-size:11px;color:var(--t4)">${p.titel_display||''} · ${p.avdelning_namn||'Extern'}</div></div>
            <div class="picker-cap"><div class="picker-cap-val ${cls}">${fh(rem)}</div><div class="picker-cap-label">återstår</div></div>
          </div>`;}).join('')||'<div style="text-align:center;color:var(--t4);padding:20px">Ingen match</div>'}
        <div class="hours-row">
          <label>Timmar:</label>
          <input class="hours-input" id="pk-t" type="number" min="1" max="500" value="${t}" oninput="S.pickerTimmar=parseInt(this.value)||60;refreshPicker()"/>
          <select id="pk-typ" class="sel"><option value="">Allmän</option>
            <option value="forelasning">Föreläsning</option><option value="seminarium">Seminarium</option>
            <option value="examination">Examination</option><option value="handledning">Handledning</option></select>
          <select id="pk-st" class="sel"><option value="begard">Begär (→ AVDC)</option>
            <option value="utkast">Utkast</option><option value="godkand">Godkänn direkt</option></select>
        </div>
        ${S.pickerValMsg?`<div class="val-msg ${S.pickerValMsg.typ==='fel'?'err':'warn'}">${S.pickerValMsg.meddelande}</div>`:''}
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closePicker()">Avbryt</button>
        <button class="btn-confirm" onclick="confirmAssign()" ${!S.pickerPersonId?'disabled':''}>Tilldela</button>
      </div>
    </div>
  </div>`;
}

function refreshPicker(){ const e=document.querySelector('.modal-bg'); if(!e)return; const t=document.createElement('div'); t.innerHTML=renderPicker(); e.replaceWith(t.firstChild); }

async function openPicker(kursId) {
  S.pickerKursId=kursId; S.pickerPersonId=null; S.pickerTimmar=60; S.pickerStatus='begard'; S.pickerSearch=''; S.pickerValMsg=null;
  if (!S.kapacitet){
    document.getElementById('app').insertAdjacentHTML('beforeend',`<div class="modal-bg"><div class="loading"><div class="spinner"></div><span>Laddar kapacitet…</span></div></div>`);
    await ensureKap(); document.querySelector('.modal-bg')?.remove();
  }
  document.getElementById('app').insertAdjacentHTML('beforeend',renderPicker());
}

function closePicker(){ document.querySelector('.modal-bg')?.remove(); }

function pickerSel(id){
  S.pickerPersonId=id; S.pickerValMsg=null; refreshPicker();
  api(`/personal/${id}/validera?timmar=${S.pickerTimmar}&ar=${S.year}`)
    .then(res=>{S.pickerValMsg=res.fel.length>0?res.fel[0]:null;refreshPicker();}).catch(()=>{});
}

async function confirmAssign() {
  if (!S.pickerPersonId||!S.pickerKursId) return;
  const timtyp=document.getElementById('pk-typ')?.value||null;
  const status=document.getElementById('pk-st')?.value||'begard';
  try {
    await api('/kurser/belaggningar',{method:'POST',body:JSON.stringify({
      kurs_id:S.pickerKursId, person_id:S.pickerPersonId, timmar:S.pickerTimmar, timtyp:timtyp||null, status
    })});
    invalidate(); closePicker(); await loadBase();
    if (S.selectedKurs===S.pickerKursId) await loadKurs(S.pickerKursId);
    render();
  } catch(e) {
    S.pickerValMsg={typ:'fel',meddelande:Array.isArray(e.detail)?e.detail[0]?.meddelande:(typeof e.detail==='string'?e.detail:'Fel')};
    refreshPicker();
  }
}

  render();
}

// ── PERSON EDIT ───────────────────────────────────────────────────────────────
async function openPersonEdit() {
  const {personId} = S.personOverlay;
  S.personEditMode = true; S.personEditData = null; render();
  const p = await api('/personal/'+personId);
  const anst = (p.anstallningar||[])[0] || {};
  S.personEditData = {
    id: p.id,
    namn: p.namn, initialer: p.initialer,
    titel_typ: p.titel_typ||'', titel_display: p.titel_display||'',
    amnesomrade: p.amnesomrade||'',
    personalkategori: p.personalkategori, kategori_typ: p.kategori_typ,
    fran_organisation: p.fran_organisation||'',
    avdelning_id: p.avdelning_id||'',
    aktiv: p.aktiv,
    anst_id: anst.id||null,
    tjanstgoringspct: anst.tjanstgoringspct||100,
    brutto_timmar: anst.brutto_timmar||1975,
    semester_timmar: anst.semester_timmar||275,
    fok_pct_override: anst.fok_pct_override??'',
    kollegialt_pct_override: anst.kollegialt_pct_override??'',
    giltig_fran: anst.giltig_fran||'',
    giltig_till: anst.giltig_till||'',
    anv_epost: p.anvandare?.epost||'',
    saveMsg: null, saving: false,
  };
  render();
}

function cancelPersonEdit() { S.personEditMode=false; S.personEditData=null; render(); }

function editField(f, v) { if (S.personEditData) { S.personEditData[f]=v; S.personEditData.saveMsg=null; } }

function renderPersonEditForm() {
  const d = S.personEditData;
  if (!d) return loadingHtml();
  const avdOpts = (S.avdelningar||[]).map(a=>`<option value="${a.id}" ${d.avdelning_id==a.id?'selected':''}>${a.namn}</option>`).join('');
  const titelTyper = ['','professor','docent','lektor','adjunkt','doktorand','forskare','forskarassistent','provutvecklare','annan'];
  const titelOpts = titelTyper.map(t=>`<option value="${t}" ${d.titel_typ===t?'selected':''}>${t||'— ingen —'}</option>`).join('');
  const katOpts = ['undervisande','administrativ','teknisk','extern'].map(k=>`<option value="${k}" ${d.personalkategori===k?'selected':''}>${k}</option>`).join('');
  const katTypOpts = ['anstalld','inlanad','extern'].map(k=>`<option value="${k}" ${d.kategori_typ===k?'selected':''}>${k}</option>`).join('');

  return `<div class="edit-form">
    <div class="form-section">Grunduppgifter</div>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Namn</label>
        <input class="form-input" value="${d.namn}" oninput="editField('namn',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Initialer</label>
        <input class="form-input" maxlength="5" value="${d.initialer}" oninput="editField('initialer',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Titeltyp</label>
        <select class="form-select" onchange="editField('titel_typ',this.value)">${titelOpts}</select>
      </div>
      <div class="form-field">
        <label class="form-label">Titeldisplay (fritext)</label>
        <input class="form-input" value="${d.titel_display}" oninput="editField('titel_display',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Ämnesområde</label>
        <input class="form-input" value="${d.amnesomrade}" oninput="editField('amnesomrade',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Avdelning</label>
        <select class="form-select" onchange="editField('avdelning_id',+this.value||null)">
          <option value="">— ingen —</option>${avdOpts}
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Personalkategori</label>
        <select class="form-select" onchange="editField('personalkategori',this.value)">${katOpts}</select>
      </div>
      <div class="form-field">
        <label class="form-label">Kategori typ</label>
        <select class="form-select" onchange="editField('kategori_typ',this.value)">${katTypOpts}</select>
      </div>
      <div class="form-field">
        <label class="form-label">Från organisation (extern/inlånad)</label>
        <input class="form-input" value="${d.fran_organisation}" oninput="editField('fran_organisation',this.value)"/>
      </div>
      <div class="form-field" style="display:flex;align-items:center;gap:10px;padding-top:20px">
        <input type="checkbox" id="aktiv-cb" ${d.aktiv?'checked':''} onchange="editField('aktiv',this.checked)" style="width:16px;height:16px;cursor:pointer"/>
        <label for="aktiv-cb" class="form-label" style="margin:0;cursor:pointer">Aktiv</label>
      </div>
    </div>

    ${d.anst_id ? `<div class="form-section">Anställning</div>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Tjänstgöringsgrad %</label>
        <input class="form-input" type="number" min="0" max="100" step="1" value="${d.tjanstgoringspct}" oninput="editField('tjanstgoringspct',+this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Bruttotimmar</label>
        <input class="form-input" type="number" min="0" value="${d.brutto_timmar}" oninput="editField('brutto_timmar',+this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Semestertimmar</label>
        <input class="form-input" type="number" min="0" value="${d.semester_timmar}" oninput="editField('semester_timmar',+this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">FOK% override (tomt = global)</label>
        <input class="form-input" type="number" min="0" max="100" step="1" placeholder="Globalt default" value="${d.fok_pct_override}" oninput="editField('fok_pct_override',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Kollegialt% override (tomt = global)</label>
        <input class="form-input" type="number" min="0" max="100" step="1" placeholder="Globalt default" value="${d.kollegialt_pct_override}" oninput="editField('kollegialt_pct_override',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Giltig från</label>
        <input class="form-input" type="date" value="${d.giltig_fran}" oninput="editField('giltig_fran',this.value)"/>
      </div>
      <div class="form-field">
        <label class="form-label">Giltig till (tomt = tillsvidare)</label>
        <input class="form-input" type="date" value="${d.giltig_till}" oninput="editField('giltig_till',this.value)"/>
      </div>
    </div>` : '<div style="color:var(--t4);font-size:12px;margin:8px 0">Ingen anställningsrad — lägg till via backend.</div>'}

    ${d.anv_epost ? `<div class="form-section">Inloggning</div>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">E-post (användarnamn)</label>
        <input class="form-input" value="${d.anv_epost}" disabled style="opacity:.6" title="Ändras ej här ännu"/>
      </div>
    </div>` : ''}

    ${d.saveMsg?`<div class="form-msg ${d.saveMsg.ok?'ok':'err'}">${d.saveMsg.text}</div>`:''}
    <div class="form-actions">
      <button class="btn-cancel" onclick="cancelPersonEdit()">Avbryt</button>
      <button class="btn-save" onclick="savePersonEdit()" ${d.saving?'disabled':''}>
        ${d.saving?'Sparar…':'Spara ändringar'}
      </button>
    </div>
  </div>`;
}

async function savePersonEdit() {
  const d = S.personEditData;
  if (!d) return;
  d.saving = true; d.saveMsg = null; render();
  try {
    const personBody = {
      namn: d.namn, initialer: d.initialer,
      titel_typ: d.titel_typ||null, titel_display: d.titel_display||null,
      amnesomrade: d.amnesomrade||null, personalkategori: d.personalkategori,
      kategori_typ: d.kategori_typ, fran_organisation: d.fran_organisation||null,
      avdelning_id: d.avdelning_id||null, aktiv: d.aktiv,
    };
    await api('/personal/'+d.id, {method:'PATCH', body:JSON.stringify(personBody)});

    if (d.anst_id) {
      const anstBody = {
        tjanstgoringspct: d.tjanstgoringspct,
        brutto_timmar: d.brutto_timmar,
        semester_timmar: d.semester_timmar,
        giltig_fran: d.giltig_fran||undefined,
        giltig_till: d.giltig_till||null,
        clear_fok_override: d.fok_pct_override==='',
        clear_kollegialt_override: d.kollegialt_pct_override==='',
      };
      if (d.fok_pct_override!=='') anstBody.fok_pct_override = +d.fok_pct_override;
      if (d.kollegialt_pct_override!=='') anstBody.kollegialt_pct_override = +d.kollegialt_pct_override;
      await api('/personal/'+d.id+'/anstallning/'+d.anst_id, {method:'PATCH', body:JSON.stringify(anstBody)});
    }

    // Invalidate caches for this person
    Object.keys(S.kontoCache).filter(k=>k.startsWith(d.id+'_')).forEach(k=>delete S.kontoCache[k]);
    S.personal = null; S.kapacitet = null;
    d.saving = false; d.saveMsg = {ok:true, text:'Ändringar sparade.'};
    await loadBase();
    render();
  } catch(e) {
    d.saving = false;
    d.saveMsg = {ok:false, text:'Fel: '+(e.detail||(Array.isArray(e)?e[0]?.msg:'okänt fel'))};
    render();
  }
}

// ── EVENTS ─────────────────────────────────────────────────────────────────────
function navigate(view){ S.view=view; S.selectedKurs=null; S.kursDetail=null; S.personOverlay=null; S.personEditMode=false; render(); }

async function selectKurs(id){ S.selectedKurs=id; S.kursDetail=null; rc(); await loadKurs(id); rc(); }

async function approveAsg(id, godkand){
  await api('/kurser/belaggningar/'+id+'/status',{method:'PATCH',body:JSON.stringify({status:godkand?'godkand':'nekad'})});
  invalidate(); await loadBase();
  if (S.selectedKurs) await loadKurs(S.selectedKurs);
  rc();
}

async function deleteAsg(id){
  await api('/kurser/belaggningar/'+id,{method:'DELETE'});
  invalidate(); await loadBase();
  if (S.selectedKurs) await loadKurs(S.selectedKurs);
  rc();
}

function rc(){ const el=document.getElementById('content'); if(el) el.innerHTML=currentView(); }

function currentView(){
  switch(S.view){
    case 'mittteam':  return renderMittteam();
    case 'dashboard': return renderDashboard();
    case 'bemanning': return renderBemanning();
    case 'kapacitet': return renderKapacitet();
    case 'personal':  return renderPersonal();
    case 'budget':        return renderBudget();
    case 'rapporter':     return renderRapporter();
    case 'installningar': return renderInstallningar();
    default:              return renderDashboard();
  }
}

async function render(){
  const app=document.getElementById('app');
  if (!S.token||!S.user){ app.innerHTML=renderLogin(); return; }
  if (!S.kurser){
    app.innerHTML=renderShell(loadingHtml());
    try{ await loadBase(); }catch(e){ console.error(e); }
  }
  const dashNeedsKap=['avdc','prefekt','sysadmin'].includes(role());
  if ((S.view==='mittteam'||S.view==='kapacitet'||S.view==='rapporter'||(S.view==='dashboard'&&dashNeedsKap))&&!S.kapacitet){
    app.innerHTML=renderShell(loadingHtml());
    await ensureKap();
  }
  if (S.view==='installningar'&&!S.installningar){
    app.innerHTML=renderShell(loadingHtml());
    try { S.installningar=await api('/installningar'); } catch(e){ console.error(e); }
  }
  app.innerHTML=renderShell(currentView());
}

render();
</script>
</body>
</html>
